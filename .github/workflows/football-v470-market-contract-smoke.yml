name: Football V4.7 Market Contract Smoke

on:
  push:
    branches:
      - main
    paths:
      - "football-data/engine/market_snapshot_contract_v470.py"
      - "football-data/config/evidence_sources_v470.json"
      - "football-data/validation/smoke_market_snapshot_contract_v470.py"
      - ".github/workflows/football-v470-market-contract-smoke.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v470-market-contract-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile market contract assets
        run: |
          python -m py_compile football-data/engine/market_snapshot_contract_v470.py
          python -m py_compile football-data/validation/smoke_market_snapshot_contract_v470.py

      - name: Run market contract smoke audit
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/smoke_market_snapshot_contract_v470.py

      - name: Commit smoke receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/market_snapshot_contract_v470_smoke.json
          if git diff --cached --quiet; then
            echo "No market contract smoke changes."
            exit 0
          fi
          git commit -m "audit(football): persist market snapshot contract smoke receipt"
          git pull --rebase origin main
          git push origin HEAD:main
