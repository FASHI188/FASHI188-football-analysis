name: football-draw-recalibration-kl-v5535

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/draw_recalibration_kl_v5535.py"
      - ".github/workflows/football-draw-recalibration-kl-v5535.yml"

permissions:
  contents: read

jobs:
  experiment:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile experiment
        run: python -m py_compile football-data/validation/draw_recalibration_kl_v5535.py
      - name: Run leakage-safe draw recalibration and KL projection
        run: python football-data/validation/draw_recalibration_kl_v5535.py
      - name: Persist V5.5.35 receipt safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/draw_recalibration_kl_v5535_status.json \
            --message-prefix "audit(football): persist V5.5.35 draw recalibration KL"

# One-time challenge experiment. No schedule. No CURRENT/model/runtime mutation.
