name: Football Platform Integrity

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "football-data/config/platform_registry.json"
      - "football-data/config/team_strength_config.json"
      - "football-data/config/team_aliases.json"
      - "football-data/schemas/**"
      - "football-data/engine/platform_core.py"
      - "football-data/engine/build_team_strengths.py"
      - "football-data/engine/build_training_dataset.py"
      - "football-data/engine/match_pipeline.py"
      - "football-data/engine/validate_platform.py"
      - "football-data/engine/evaluate_audits.py"
      - "football-data/validation/repository_integrity_runtime_v473.py"
      - "football-data/validation/persist_generated_worktree_v474.py"
      - "football-data/tests/test_platform_core.py"
      - "football-data/tests/test_team_strengths.py"
      - "football-data/tests/test_prediction_pipeline.py"
      - "football-data/processed/**"
      - ".github/workflows/football-platform-integrity.yml"
  pull_request:
    branches: [main]
    paths:
      - "football-data/config/platform_registry.json"
      - "football-data/config/team_strength_config.json"
      - "football-data/config/team_aliases.json"
      - "football-data/schemas/**"
      - "football-data/engine/platform_core.py"
      - "football-data/engine/build_team_strengths.py"
      - "football-data/engine/build_training_dataset.py"
      - "football-data/engine/match_pipeline.py"
      - "football-data/engine/validate_platform.py"
      - "football-data/engine/evaluate_audits.py"
      - "football-data/validation/repository_integrity_runtime_v473.py"
      - "football-data/validation/persist_generated_worktree_v474.py"
      - "football-data/tests/test_platform_core.py"
      - "football-data/tests/test_team_strengths.py"
      - "football-data/tests/test_prediction_pipeline.py"
      - "football-data/processed/**"
      - ".github/workflows/football-platform-integrity.yml"
  schedule:
    - cron: "17 4 * * 1,4"

permissions:
  contents: read

concurrency:
  group: football-platform-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Repository-wide fail-closed preflight
        run: python football-data/validation/repository_integrity_runtime_v473.py --strict-exit --print-summary

      - name: Compile persistence helper
        run: python -m py_compile football-data/validation/persist_generated_worktree_v474.py

      - name: Run platform tests
        env:
          PYTHONPATH: football-data/engine
        run: python -m unittest discover -s football-data/tests -p "test_platform*.py" -v && python -m unittest discover -s football-data/tests -p "test_team_strengths.py" -v && python -m unittest discover -s football-data/tests -p "test_prediction_pipeline.py" -v

      - name: Build descriptive team features
        id: team_features
        shell: bash
        env:
          PYTHONPATH: football-data/engine
        run: |
          mkdir -p football-data/manifests
          set +e
          python football-data/engine/build_team_strengths.py --print-summary 2>&1 | tee football-data/manifests/team_strength_build.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload team-feature diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: football-team-strength-diagnostics
          path: |
            football-data/manifests/team_strength_build.log
            football-data/manifests/latest_team_strengths.json
          if-no-files-found: warn
          retention-days: 7

      - name: Build time-ordered training datasets
        if: steps.team_features.outputs.status == '0'
        env:
          PYTHONPATH: football-data/engine
        run: python football-data/engine/build_training_dataset.py --print-summary

      - name: Aggregate postmatch audits
        if: steps.team_features.outputs.status == '0'
        env:
          PYTHONPATH: football-data/engine
        run: python football-data/engine/evaluate_audits.py --print-summary

      - name: Validate complete platform
        if: steps.team_features.outputs.status == '0'
        env:
          PYTHONPATH: football-data/engine
        run: python football-data/engine/validate_platform.py --print-summary

      - name: Persist deterministic generated artifacts safely
        if: ${{ github.event_name != 'pull_request' && steps.team_features.outputs.status == '0' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --branch main \
            --allow-prefix football-data/team_strengths/ \
            --allow-prefix football-data/training_datasets/ \
            --allow-prefix football-data/manifests/ \
            --message-prefix "data(football): persist validated platform artifact"

      - name: Enforce team-feature build result
        if: steps.team_features.outputs.status != '0'
        run: exit 1

# V4.7.4 hardening: PRs validate without mutation; failed builders never persist;
# generated artifacts use optimistic Contents API writes rather than git rebase/push.
