name: Football V4.7 Dynamic Strength Live Activation Readiness

on:
  push:
    branches:
      - main
    paths:
      - "football-data/manifests/dynamic_strength_final_chain_replay_v470/ESP_LaLiga.json"
      - "football-data/manifests/dynamic_strength_allocation_only_final_chain_v470/NED_Eredivisie.json"
      - "football-data/manifests/dynamic_strength_next_season_selection_v470_status.json"
      - "football-data/manifests/dynamic_strength_live_input_contract_v470_smoke.json"
      - "football-data/manifests/dynamic_strength_pre_oof_runtime_v470_smoke.json"
      - "football-data/manifests/formal_next_season_parameter_rollforward_v470_status.json"
      - "football-data/manifests/formal_next_season_parameter_runtime_v470_smoke.json"
      - "football-data/manifests/oof_next_season_rollforward_v470_status.json"
      - "football-data/manifests/oof_next_season_runtime_v470_smoke.json"
      - "football-data/engine/run_formal_prediction_actionable.py"
      - "football-data/config/platform_registry.json"
      - "football-data/config/formal_core_v460.json"
      - "football-data/validation/dynamic_strength_live_activation_readiness_v470.py"
      - ".github/workflows/football-v470-dynamic-strength-live-activation-readiness.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v470-dynamic-strength-live-activation-readiness
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile football-data/validation/dynamic_strength_live_activation_readiness_v470.py
      - run: python football-data/validation/dynamic_strength_live_activation_readiness_v470.py
      - name: Commit readiness receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/dynamic_strength_live_activation_readiness_v470_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist dynamic-strength live activation readiness"
          git pull --rebase origin main
          git push origin HEAD:main
