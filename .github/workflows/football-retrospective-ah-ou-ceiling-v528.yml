name: football-retrospective-ah-ou-ceiling-v528

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/retrospective_ah_ou_ceiling_v528.py"
      - ".github/workflows/football-retrospective-ah-ou-ceiling-v528.yml"

permissions:
  contents: write

concurrency:
  group: football-retrospective-ah-ou-ceiling-v528
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run five-league retrospective AH/OU ceiling
        run: |
          python -m py_compile football-data/validation/retrospective_ah_ou_ceiling_v528.py
          python football-data/validation/retrospective_ah_ou_ceiling_v528.py
      - name: Commit diagnostic receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- football-data/manifests/retrospective_ah_ou_ceiling_v528_status.json
          if git diff --cached --quiet; then
            echo "No AH/OU ceiling result changed."
            exit 0
          fi
          git commit -m "research(football): persist retrospective AH OU ceiling"
          git pull --rebase origin main
          git push
