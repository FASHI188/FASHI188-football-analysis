name: football-v6-draw-resolution-v674
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_draw_resolution_registry_v674.py"
      - ".github/workflows/football-v6-draw-resolution-v674.yml"
      - "football-data/manifests/v6_draw_residual_override_v670_status.json"
      - "football-data/manifests/v6_dynamic_draw_propensity_v671_status.json"
      - "football-data/manifests/v6_zero_modified_skellam_draw_v672_status.json"
      - "football-data/manifests/v6_draw_probability_calibration_v673_status.json"
permissions:
  contents: read
jobs:
  validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_draw_resolution_registry_v674.py
      - run: python football-data/validation/v6_draw_resolution_registry_v674.py
      - name: Persist
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_draw_resolution_registry_v674_status.json \
            --message-prefix "audit(football): persist V6.7.4 draw resolution registry"
      - name: Enforce
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('football-data/manifests/v6_draw_resolution_registry_v674_status.json')
          if not p.exists(): raise SystemExit('V674 missing')
          x=json.loads(p.read_text())
          if x.get('status')!='PASS': raise SystemExit(json.dumps(x.get('evidence_checks'),ensure_ascii=False))
          print(json.dumps({'diagnosis':x['diagnosis'],'policy':x['research_policy'],'context':x['prospective_context_epoch']},ensure_ascii=False))
          PY
# Research governance only; CURRENT untouched.
