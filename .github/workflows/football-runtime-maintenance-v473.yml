name: Football V4.7.3 Runtime Maintenance

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/football-runtime-maintenance-v473.yml"
      - "football-data/validation/runtime_maintenance_v473.py"
      - "football-data/validation/repository_integrity_v471.py"
      - "football-data/validation/repository_integrity_runtime_v473.py"
      - "football-data/validation/repository_asset_topology_v472.py"
      - "football-data/config/platform_registry.json"
      - "football-data/engine/ingest_batch_001_safe_adapter.py"
      - "football-data/tests/test_ingest_batch_001_safe_merge.py"
      - "football-data/league_profiles/**"
      - "football-data/processed/**"
  schedule:
    - cron: "11 5 * * 1,4"

permissions:
  contents: read

concurrency:
  group: football-runtime-maintenance-v473-${{ github.ref }}
  cancel-in-progress: true

jobs:
  maintain:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile maintenance and guard scripts
        run: |
          python -m py_compile \
            football-data/validation/runtime_maintenance_v473.py \
            football-data/validation/repository_integrity_v471.py \
            football-data/validation/repository_integrity_runtime_v473.py \
            football-data/validation/repository_asset_topology_v472.py

      - name: Run V4.7.3 maintenance and write local receipt
        run: python football-data/validation/runtime_maintenance_v473.py --write-receipt --print-summary

      - name: Enforce fail-closed maintenance gate before persistence
        run: python football-data/validation/runtime_maintenance_v473.py --strict-exit --print-summary

      - name: Persist PASS maintenance receipt via GitHub Contents API
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          path = Path("football-data/manifests/runtime_maintenance_v473_status.json")
          report = json.loads(path.read_text(encoding="utf-8"))
          if report.get("status") != "PASS":
              raise SystemExit("refusing to persist non-PASS runtime maintenance receipt")

          repo = os.environ["GH_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          rel = path.as_posix()
          encoded_path = "/".join(urllib.parse.quote(part, safe="") for part in rel.split("/"))
          get_url = f"https://api.github.com/repos/{repo}/contents/{encoded_path}?ref=main"
          put_url = f"https://api.github.com/repos/{repo}/contents/{encoded_path}"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "football-runtime-maintenance-v473",
          }

          def request(method, url, payload=None, allow_conflict=False):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req) as response:
                      body = response.read().decode("utf-8")
                      return response.status, json.loads(body) if body else None
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  if exc.code == 404:
                      return 404, None
                  if allow_conflict and exc.code in {409, 422}:
                      return exc.code, body
                  raise RuntimeError(f"GitHub API {method} {url} failed: {exc.code} {body}") from exc

          content = base64.b64encode(path.read_bytes()).decode("ascii")
          for attempt in range(1, 4):
              status, current = request("GET", get_url)
              payload = {
                  "message": "maint(football): persist V4.7.3 runtime maintenance receipt",
                  "content": content,
                  "branch": "main",
              }
              if status == 200 and current:
                  payload["sha"] = current["sha"]
              put_status, detail = request("PUT", put_url, payload, allow_conflict=True)
              if put_status in {200, 201}:
                  print("persisted runtime maintenance receipt")
                  break
              if attempt == 3:
                  raise RuntimeError(f"maintenance receipt persistence conflict: {put_status} {detail}")
              time.sleep(attempt)
          PY

# V4.7.4 hardening: maintenance validates first and writes only its own PASS receipt.
# No git commit/pull/rebase/push occurs inside CI, eliminating detached-head and rebase races.
