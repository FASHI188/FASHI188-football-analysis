name: Football V4.7.3 Runtime Maintenance

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/football-runtime-maintenance-v473.yml"
      - "football-data/validation/runtime_maintenance_v473.py"
      - "football-data/validation/repository_integrity_v471.py"
      - "football-data/validation/repository_asset_topology_v472.py"
      - "football-data/config/platform_registry.json"
      - "football-data/engine/ingest_batch_001_safe_adapter.py"
      - "football-data/tests/test_ingest_batch_001_safe_merge.py"
      - "football-data/league_profiles/**"
      - "football-data/processed/**"
  schedule:
    - cron: "11 5 * * 1,4"

permissions:
  contents: write

concurrency:
  group: football-runtime-maintenance-v473-${{ github.ref }}
  cancel-in-progress: true

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile maintenance and guard scripts
        run: |
          python -m py_compile \
            football-data/validation/runtime_maintenance_v473.py \
            football-data/validation/repository_integrity_v471.py \
            football-data/validation/repository_asset_topology_v472.py

      - name: Run V4.7.3 maintenance and persist receipt locally
        run: python football-data/validation/runtime_maintenance_v473.py --write-receipt --print-summary

      - name: Persist maintenance receipts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            football-data/manifests/runtime_maintenance_v473_status.json \
            football-data/manifests/repository_integrity_v471_status.json \
            football-data/manifests/repository_asset_topology_v472_status.json
          if git diff --cached --quiet; then
            echo "No maintenance receipt changes."
          else
            git commit -m "maint(football): persist V4.7.3 runtime maintenance receipt [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Enforce fail-closed maintenance gate
        run: python football-data/validation/runtime_maintenance_v473.py --strict-exit --print-summary

# Trigger marker: V4.7.3 initial maintenance validation.
