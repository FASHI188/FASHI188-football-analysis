name: football-retrospective-ah-ou-por-sco-parallel-v544

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/retrospective_ah_ou_domain_v544.py"
      - "football-data/validation/retrospective_ah_ou_aggregate_v544.py"
      - ".github/workflows/football-retrospective-ah-ou-por-sco-parallel-v544.yml"

permissions:
  contents: write

concurrency:
  group: football-retrospective-ah-ou-por-sco-parallel-v544
  cancel-in-progress: true

jobs:
  domain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        competition: [POR_PrimeiraLiga, SCO_Premiership]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run domain audit
        run: |
          mkdir -p tmp-ahou-v544
          python football-data/validation/retrospective_ah_ou_domain_v544.py \
            --competition "${{ matrix.competition }}" \
            --out "tmp-ahou-v544/${{ matrix.competition }}.json"
      - name: Upload domain receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ahou-v544-${{ matrix.competition }}
          path: tmp-ahou-v544/${{ matrix.competition }}.json
          if-no-files-found: warn

  aggregate:
    if: always()
    needs: domain
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download receipts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: ahou-v544-*
          merge-multiple: true
          path: tmp-ahou-v544-all
      - name: Aggregate
        run: |
          mkdir -p tmp-ahou-v544-all
          python football-data/validation/retrospective_ah_ou_aggregate_v544.py --input tmp-ahou-v544-all
      - name: Commit aggregate receipt
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- football-data/manifests/retrospective_ah_ou_por_sco_v544_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "research(football): persist parallel POR SCO AH OU ceiling"
          git pull --rebase origin main
          git push
