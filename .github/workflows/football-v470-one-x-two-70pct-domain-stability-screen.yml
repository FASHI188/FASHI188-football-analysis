name: Football V4.7 1X2 70pct Domain Stability Screen

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/one_x_two_70pct_domain_stability_screen_v470.py"
      - "football-data/manifests/one_x_two_selective_multiseason_stability_v470_status.json"
      - ".github/workflows/football-v470-one-x-two-70pct-domain-stability-screen.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run screen
        run: python football-data/validation/one_x_two_70pct_domain_stability_screen_v470.py
      - name: Commit receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/one_x_two_70pct_domain_stability_screen_v470_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist per-domain 70pct stability screen"
          git pull --rebase origin main
          git push origin HEAD:main
