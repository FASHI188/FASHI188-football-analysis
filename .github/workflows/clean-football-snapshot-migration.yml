name: One-time Clean Football Snapshot Migration

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "migration/START"

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Import clean football snapshot from HHH1 private action
        uses: FASHI188/HHH1/.github/actions/football-clean-snapshot@main

      - name: Remove one-time migration controls
        shell: bash
        run: |
          rm -rf migration
          rm -f .github/workflows/clean-football-snapshot-migration.yml

      - name: Commit clean snapshot as target repository baseline
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(football): establish clean football-only runtime baseline"
          git push origin HEAD:main
