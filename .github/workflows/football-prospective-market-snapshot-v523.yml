name: football-prospective-market-snapshot-v523

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/config/prospective_market_snapshot_contract_v523.json"
      - "football-data/config/prospective_market_selective_challenger_v526.json"
      - "football-data/config/market_matrix_projection_final_registry_v531.json"
      - "football-data/evidence/markets_prospective/**"
      - "football-data/validation/prospective_market_snapshot_v523.py"
      - "football-data/validation/prospective_market_snapshot_audit_v523.py"
      - "football-data/validation/prospective_market_selective_shadow_v526.py"
      - "football-data/validation/prospective_market_matrix_shadow_v531.py"
      - "football-data/tests/test_prospective_market_snapshot_v523.py"
      - "football-data/tests/test_prospective_market_selective_shadow_v526.py"
      - "football-data/tests/test_prospective_market_matrix_shadow_v531.py"
      - "football-data/tests/test_prospective_market_matrix_por_v543.py"
      - ".github/workflows/football-prospective-market-snapshot-v523.yml"

permissions:
  contents: write

concurrency:
  group: football-prospective-market-snapshot-v523
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test runner
        run: python -m pip install pytest
      - name: Run hard-gate and shadow-layer unit tests
        run: |
          python -m py_compile \
            football-data/validation/prospective_market_snapshot_v523.py \
            football-data/validation/prospective_market_snapshot_audit_v523.py \
            football-data/validation/prospective_market_selective_shadow_v526.py \
            football-data/validation/prospective_market_matrix_shadow_v531.py
          python -m pytest -q \
            football-data/tests/test_prospective_market_snapshot_v523.py \
            football-data/tests/test_prospective_market_selective_shadow_v526.py \
            football-data/tests/test_prospective_market_matrix_shadow_v531.py \
            football-data/tests/test_prospective_market_matrix_por_v543.py
      - name: Audit all prospective market evidence
        run: python football-data/validation/prospective_market_snapshot_audit_v523.py
      - name: Commit market snapshot audit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- football-data/manifests/prospective_market_snapshot_v523_status.json
          if git diff --cached --quiet; then
            echo "No prospective market snapshot audit changed."
            exit 0
          fi
          git commit -m "audit(football): persist prospective market snapshot status"
          git pull --rebase origin main
          git push
