name: Football V4.7.2 Restore Missing Assets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/football-restore-missing-assets-v472.yml"

permissions:
  contents: write

concurrency:
  group: football-restore-missing-assets-v472
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Import frozen HHH1 source snapshot
        uses: FASHI188/HHH1/.github/actions/export-football-snapshot-v472@main
        with:
          output-path: source_repository_snapshot_v472.json

      - name: Restore only missing source data/profile assets
        uses: FASHI188/HHH1/.github/actions/restore-missing-football-assets-v472@main

      - name: Verify restored files byte-for-byte against source snapshot
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          required = [
              "football-data/league_profiles/ARG_Primera/profile.json",
              "football-data/league_profiles/BRA_SerieA/profile.json",
              "football-data/league_profiles/JPN_J1/profile.json",
              "football-data/league_profiles/KOR_KLeague1/profile.json",
              "football-data/league_profiles/NOR_Eliteserien/profile.json",
              "football-data/league_profiles/UEFA_ChampionsLeague/profile.json",
              "football-data/league_profiles/USA_MLS/profile.json",
              "football-data/processed/ARG_Primera/recent_seasons.csv",
              "football-data/processed/BRA_SerieA/recent_seasons.csv",
              "football-data/processed/JPN_J1/recent_seasons.csv",
              "football-data/processed/KOR_KLeague1/official_results.csv",
              "football-data/processed/NOR_Eliteserien/full_archive_through_2026.csv",
              "football-data/processed/UEFA_ChampionsLeague/main_tournament_90min_safe.csv",
              "football-data/processed/USA_MLS/recent_seasons.csv",
              "football-data/raw/ARG_Primera/upstream_archive.csv",
              "football-data/raw/BRA_SerieA/upstream_archive.csv",
              "football-data/raw/JPN_J1/upstream_archive.csv",
              "football-data/raw/KOR_KLeague1/request_manifest.json",
              "football-data/raw/NOR_Eliteserien/full_archive_through_2026.csv",
              "football-data/raw/UEFA_ChampionsLeague/2021-22.txt",
              "football-data/raw/UEFA_ChampionsLeague/2022-23.txt",
              "football-data/raw/UEFA_ChampionsLeague/2023-24.txt",
              "football-data/raw/UEFA_ChampionsLeague/2024-25.txt",
              "football-data/raw/UEFA_ChampionsLeague/2025-26.txt",
              "football-data/raw/USA_MLS/upstream_archive.csv",
          ]
          source = json.loads(Path("source_repository_snapshot_v472.json").read_text(encoding="utf-8"))
          index = {item["path"]: item for item in source["entries"]}
          for rel in required:
              path = Path(rel)
              if not path.is_file():
                  raise SystemExit(f"restored asset still missing: {rel}")
              h = hashlib.sha256(path.read_bytes()).hexdigest()
              if h != index[rel]["sha256"]:
                  raise SystemExit(f"restored asset hash mismatch: {rel}")
          print(f"verified {len(required)} restored source assets")
          PY

      - name: Commit restored assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/raw football-data/processed football-data/league_profiles
          if git diff --cached --quiet; then
            echo "No missing assets required restoration."
            exit 0
          fi
          git commit -m "repair(football): restore source assets removed by batch001 root replacement [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
