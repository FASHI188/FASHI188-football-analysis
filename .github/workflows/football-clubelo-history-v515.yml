name: football-clubelo-history-v515

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/config/clubelo_residual_challenger_v515.json"
      - "football-data/validation/clubelo_history_ingest_v515.py"
      - "football-data/validation/clubelo_history_runner_v515.py"
      - "football-data/tests/test_clubelo_identity_v515.py"
      - ".github/workflows/football-clubelo-history-v515.yml"

permissions:
  contents: write

concurrency:
  group: football-clubelo-history-v515
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test runner
        run: python -m pip install pytest
      - name: Syntax and identity invariant checks
        run: |
          python -m py_compile \
            football-data/validation/clubelo_history_ingest_v515.py \
            football-data/validation/clubelo_history_runner_v515.py
          python -m pytest -q football-data/tests/test_clubelo_identity_v515.py
      - name: Ingest ClubElo histories or persist execution failure
        run: python football-data/validation/clubelo_history_runner_v515.py
      - name: Commit evidence or r2 diagnostic receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -d football-data/evidence/clubelo_v515 ]; then
            git add -A -- football-data/evidence/clubelo_v515
          fi
          git add -A -- football-data/manifests/clubelo_history_ingest_v515_status.json
          if git diff --cached --quiet; then
            echo "No ClubElo history evidence changed."
            exit 0
          fi
          git commit -m "research(football): persist ClubElo history evidence"
          git pull --rebase origin main
          git push
