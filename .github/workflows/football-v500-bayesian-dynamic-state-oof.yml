name: Football V5 Bayesian Dynamic State OOF

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/bayesian_dynamic_state_oof_v500.py"
      - "football-data/validation/backtest_last_complete_season_all_domains_v470.py"
      - "football-data/engine/football_v460_engine.py"
      - "football-data/engine/oof_matrix_calibration.py"
      - ".github/workflows/football-v500-bayesian-dynamic-state-oof.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v500-bayesian-dynamic-state-oof
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Normalize Python boolean literals
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("football-data/validation/bayesian_dynamic_state_oof_v500.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace('"handicap_fourth_target_available": false', '"handicap_fourth_target_available": False')
          text = text.replace('"automatic_promotion": false', '"automatic_promotion": False')
          text = text.replace('"probability_change": false', '"probability_change": False')
          text = text.replace('"formal_weight_change": false', '"formal_weight_change": False')
          path.write_text(text, encoding="utf-8")
          PY
      - name: Compile
        run: |
          python -m py_compile football-data/validation/bayesian_dynamic_state_oof_v500.py
      - name: Run 17-domain strict chronological OOF
        id: validate
        shell: bash
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          set +e
          python football-data/validation/bayesian_dynamic_state_oof_v500.py
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit repaired script and research receipts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/validation/bayesian_dynamic_state_oof_v500.py
          git add football-data/manifests/bayesian_dynamic_state_oof_v500_status.json
          git add football-data/manifests/bayesian_dynamic_state_oof_v500 || true
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "research(football): persist V5 Bayesian dynamic-state OOF"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Preserve validation failure after receipt persistence
        if: steps.validate.outputs.rc != '0'
        run: exit 1
