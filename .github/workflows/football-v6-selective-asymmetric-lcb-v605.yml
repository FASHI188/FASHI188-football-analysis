name: football-v6-selective-asymmetric-lcb-v605

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_direct_outcome_mvp_v600.py"
      - "football-data/validation/v6_direct_outcome_draw_boundary_v601.py"
      - "football-data/validation/v6_selective_direction_lcb_v604.py"
      - "football-data/validation/v6_selective_asymmetric_lcb_v605.py"
      - "football-data/validation/v6_selective_asymmetric_lcb_v605_r2.py"
      - "football-data/validation/v6_selective_asymmetric_lcb_v605_r3.py"
      - ".github/workflows/football-v6-selective-asymmetric-lcb-v605.yml"

permissions:
  contents: read

concurrency:
  group: football-v6-selective-asymmetric-lcb-v605
  cancel-in-progress: true

jobs:
  experiment:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile V6.0.5 asymmetric LCB challenge
        run: |
          python -m py_compile football-data/validation/v6_direct_outcome_mvp_v600.py
          python -m py_compile football-data/validation/v6_direct_outcome_draw_boundary_v601.py
          python -m py_compile football-data/validation/v6_selective_direction_lcb_v604.py
          python -m py_compile football-data/validation/v6_selective_asymmetric_lcb_v605.py
          python -m py_compile football-data/validation/v6_selective_asymmetric_lcb_v605_r3.py
      - name: Run fail-closed V6.0.5 asymmetric LCB challenge
        run: python football-data/validation/v6_selective_asymmetric_lcb_v605_r3.py
      - name: Persist V6.0.5 receipt safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_selective_asymmetric_lcb_v605_status.json \
            --message-prefix "audit(football): persist V6.0.5 asymmetric LCB challenge"

# One-time fail-closed research challenge. No schedule and no formal/runtime mutation.
