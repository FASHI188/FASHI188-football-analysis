name: Football V5.0.1 AH-Constrained Dynamic Blend OOF

on:
  push:
    branches:
      - main
    paths:
      - "football-data/manifests/bayesian_dynamic_state_four_target_verdict_v501_status.json"
      - "football-data/validation/validate_ah_constrained_dynamic_blend_v501.py"
      - "football-data/validation/run_ah_constrained_dynamic_blend_v501.py"
      - ".github/workflows/football-v501-ah-constrained-dynamic-blend.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v501-ah-constrained-dynamic-blend
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: |
          python -m py_compile football-data/validation/validate_ah_constrained_dynamic_blend_v501.py
          python -m py_compile football-data/validation/run_ah_constrained_dynamic_blend_v501.py
      - name: Run nested forward OOF
        id: validate
        shell: bash
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          set +e
          python football-data/validation/run_ah_constrained_dynamic_blend_v501.py
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit research receipts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/ah_constrained_dynamic_blend_v501_status.json || true
          git add football-data/manifests/ah_constrained_dynamic_blend_v501 || true
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "research(football): persist AH-constrained dynamic blend OOF"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Preserve validation failure after receipt persistence
        if: steps.validate.outputs.rc != '0'
        run: exit 1
