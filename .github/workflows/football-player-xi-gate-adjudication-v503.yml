name: football-player-xi-gate-adjudication-v503

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/manifests/lineup_latent_signal_oof_v502_status.json"
      - "football-data/manifests/player_xi_residual_signal_oof_v502_status.json"
      - "football-data/manifests/player_xi_residual_replication_v503_status.json"
      - "football-data/validation/player_xi_gate_v503.py"
      - "football-data/validation/player_xi_gate_adjudication_v503.py"
      - "football-data/tests/test_player_xi_gate_v503.py"
      - ".github/workflows/football-player-xi-gate-adjudication-v503.yml"

permissions:
  contents: write

concurrency:
  group: football-player-xi-gate-adjudication-v503
  cancel-in-progress: true

jobs:
  adjudicate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax and polarity regressions
        run: |
          python -m py_compile \
            football-data/validation/player_xi_gate_v503.py \
            football-data/validation/player_xi_gate_adjudication_v503.py \
            football-data/tests/test_player_xi_gate_v503.py
          python football-data/tests/test_player_xi_gate_v503.py

      - name: Re-adjudicate immutable metric receipts
        run: |
          python football-data/validation/player_xi_gate_adjudication_v503.py \
            --print-summary

      - name: Commit corrected governance receipt
        run: |
          find football-data -type d -name __pycache__ -prune -exec rm -rf {} +
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/player_xi_gate_adjudication_v503_status.json
          if git diff --cached --quiet; then
            echo "No corrected governance receipt changed."
            exit 0
          fi
          git commit -m "governance(football): persist corrected player-XI gate adjudication"
          git pull --rebase origin main
          git push
