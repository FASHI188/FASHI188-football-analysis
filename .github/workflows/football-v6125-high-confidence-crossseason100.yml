name: Football V6.12.5 High Confidence CrossSeason100

on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/audit_1x2_high_confidence_crossseason100_v6125.py"
      - ".github/workflows/football-v6125-high-confidence-crossseason100.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run cross-season high-confidence audit
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/audit_1x2_high_confidence_crossseason100_v6125.py
      - name: Persist receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/v6_1x2_high_confidence_crossseason100_v6125_status.json
          git commit -m "audit(football): persist high-confidence crossseason100"
          git pull --rebase origin main
          git push origin HEAD:main
