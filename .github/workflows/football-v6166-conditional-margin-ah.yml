name: Football V6.16.6 Conditional Margin AH
on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/validate_conditional_margin_ah_v6166.py"
      - ".github/workflows/football-v6166-conditional-margin-ah.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --quiet scikit-learn
      - run: python -m py_compile football-data/validation/validate_conditional_margin_ah_v6166.py
      - env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/validate_conditional_margin_ah_v6166.py
      - shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          p=football-data/manifests/v6_conditional_margin_ah_v6166_status.json
          if [ -f "$p" ]; then git add "$p"; fi
          if ! git diff --cached --quiet; then
            git commit -m "audit(football): persist V6.16.6 conditional margin challenger"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
