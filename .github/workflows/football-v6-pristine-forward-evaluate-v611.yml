name: football-v6-pristine-forward-evaluate-v611

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_pristine_forward_evaluate_v611.py"
      - ".github/workflows/football-v6-pristine-forward-evaluate-v611.yml"

permissions:
  contents: read

concurrency:
  group: football-v6-pristine-forward-evaluate-v611
  cancel-in-progress: true

jobs:
  evaluate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile V6.1.1 forward evaluator
        run: python -m py_compile football-data/validation/v6_pristine_forward_evaluate_v611.py
      - name: Run pristine forward evaluator
        run: python football-data/validation/v6_pristine_forward_evaluate_v611.py
      - name: Persist V6.1.1 evaluation receipt safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_pristine_forward_evaluation_v611_status.json \
            --message-prefix "audit(football): persist V6.1.1 pristine forward evaluation"

# Manual/pristine evaluation only. No automatic promotion or runtime mutation.
