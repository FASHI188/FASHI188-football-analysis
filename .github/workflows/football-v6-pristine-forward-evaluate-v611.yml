name: football-v6-pristine-forward-evaluate-v611

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_pristine_forward_evaluate_v611_r2.py"
      - "football-data/forward/v6_pristine_forward_events_v612.json"
      - ".github/workflows/football-v6-pristine-forward-evaluate-v611.yml"

permissions:
  contents: read

concurrency:
  group: football-v6-pristine-forward-evaluate-v611
  cancel-in-progress: false

jobs:
  evaluate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile ledger-native V6.1.1 evaluator
        run: |
          python -m py_compile football-data/validation/v6_pristine_forward_ledger_v612.py
          python -m py_compile football-data/validation/v6_pristine_forward_evaluate_v611_r2.py
      - name: Run ledger-native pristine forward evaluator
        id: evaluate
        continue-on-error: true
        run: python football-data/validation/v6_pristine_forward_evaluate_v611_r2.py
      - name: Persist V6.1.1 evaluation receipt safely
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_pristine_forward_evaluation_v611_status.json \
            --message-prefix "audit(football): persist ledger-native V6.1.1 evaluation"
      - name: Enforce V6.1.1 integrity status
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("football-data/manifests/v6_pristine_forward_evaluation_v611_status.json")
          if not path.exists():
              raise SystemExit("V6.1.1 receipt was not generated")
          receipt = json.loads(path.read_text(encoding="utf-8"))
          if receipt.get("status") != "PASS":
              raise SystemExit(f"V6.1.1 integrity gate failed: {receipt.get('status')}")
          print(json.dumps({"status": "PASS", "evaluation_status": receipt.get("evaluation_status")}, ensure_ascii=False))
          PY

# Ledger-native forward evaluation only. No automatic promotion or runtime mutation.
