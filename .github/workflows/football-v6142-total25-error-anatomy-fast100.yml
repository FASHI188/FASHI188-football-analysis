name: Football V6.14.2 Total25 Error Anatomy Fast100

on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/audit_total25_error_anatomy_fast100_v6142.py"
      - ".github/workflows/football-v6142-total25-error-anatomy-fast100.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependency
        run: python -m pip install --disable-pip-version-check -q numpy
      - name: Run O/U2.5 error anatomy
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/audit_total25_error_anatomy_fast100_v6142.py
      - name: Persist receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/v6_total25_error_anatomy_fast100_v6142_status.json
          git commit -m "audit(football): persist O/U2.5 latest100 error anatomy"
          git pull --rebase origin main
          git push origin HEAD:main
