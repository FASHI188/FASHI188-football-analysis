name: Football V4.7 Dynamic Strength Next Season Selection

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/dynamic_strength_next_season_selection_v470.py"
      - ".github/workflows/football-v470-dynamic-strength-next-season-selection.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v470-dynamic-strength-next-season-selection
  cancel-in-progress: true

jobs:
  select:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: |
          python -m py_compile football-data/validation/dynamic_strength_oof_screen_v470.py
          python -m py_compile football-data/validation/dynamic_strength_second_stage_v470.py
          python -m py_compile football-data/validation/dynamic_strength_allocation_only_oof_v470.py
          python -m py_compile football-data/validation/dynamic_strength_allocation_only_second_stage_v470.py
          python -m py_compile football-data/validation/dynamic_strength_next_season_selection_v470.py
      - name: Select 2026/27 candidates from completed 2025/26
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/dynamic_strength_next_season_selection_v470.py
      - name: Commit selection receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/dynamic_strength_next_season_selection_v470_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "research(football): persist 2026_27 dynamic-strength frozen selections"
          git pull --rebase origin main
          git push origin HEAD:main
