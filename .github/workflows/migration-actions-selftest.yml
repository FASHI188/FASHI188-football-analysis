name: Migration Actions Self-Test

on:
  push:
    branches: [main]
    paths:
      - "migration/SELFTEST"

permissions:
  contents: write

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Write marker
        run: |
          mkdir -p migration
          printf 'ok\n' > migration/ACTIONS_OK
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add migration/ACTIONS_OK
          git commit -m "ci: confirm target Actions write permission [skip ci]"
          git push origin HEAD:main
