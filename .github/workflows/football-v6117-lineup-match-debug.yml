name: Football V6.11.7 Lineup Match Debug

on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/diagnose_v6117_lineup_matching.py"
      - ".github/workflows/football-v6117-lineup-match-debug.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependency
        run: python -m pip install --disable-pip-version-check -q numpy scikit-learn
      - name: Run diagnostics
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/diagnose_v6117_lineup_matching.py
      - name: Persist debug receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/v6_1x2_pit_lineup_matching_v6117_debug.json
          git commit -m "debug(football): persist V6.11.7 lineup matching diagnostics"
          git pull --rebase origin main
          git push origin HEAD:main
