name: football-v6180-conditional-score
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_conditional_score_reallocation_v6180.py"
      - ".github/workflows/football-v6180-conditional-score.yml"
permissions:
  contents: read
jobs:
  audit:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_conditional_score_reallocation_v6180.py
      - run: python football-data/validation/v6_conditional_score_reallocation_v6180.py
      - name: Persist receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_conditional_score_reallocation_v6180_status.json \
            --message-prefix "audit(football): persist V6.18.0 conditional score reallocation"
