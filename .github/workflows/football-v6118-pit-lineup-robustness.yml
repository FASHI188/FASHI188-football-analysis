name: Football V6.11.8 PIT Lineup Robustness

on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/validate_1x2_pit_lineup_robustness_v6118.py"
      - ".github/workflows/football-v6118-pit-lineup-robustness.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependency
        run: python -m pip install --disable-pip-version-check -q numpy scikit-learn
      - name: Compile
        run: python -m py_compile football-data/validation/validate_1x2_pit_lineup_robustness_v6118.py
      - name: Run robustness audit
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/validate_1x2_pit_lineup_robustness_v6118.py
      - name: Persist receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/v6_1x2_pit_lineup_robustness_v6118_status.json
          git commit -m "audit(football): persist PIT lineup 1X2 robustness"
          git pull --rebase origin main
          git push origin HEAD:main
