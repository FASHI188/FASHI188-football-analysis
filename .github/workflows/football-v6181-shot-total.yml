name: football-v6181-shot-total
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "football-data/validation/v6_total_shot_residual_v6181.py"
      - ".github/workflows/football-v6181-shot-total.yml"
permissions:
  contents: write
concurrency:
  group: football-v6181-shot-total
  cancel-in-progress: true
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - name: Install research dependency
        run: python -m pip install --disable-pip-version-check -q scikit-learn
      - run: python -m py_compile football-data/validation/v6_total_shot_residual_v6181.py
      - run: python football-data/validation/v6_total_shot_residual_v6181.py
        env:
          PYTHONPATH: football-data/engine:football-data/validation
      - name: Persist receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_total_shot_residual_v6181_status.json \
            --message-prefix "audit(football): persist V6.18.1 shot-informed direct total"
