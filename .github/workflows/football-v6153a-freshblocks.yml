name: Football V6.15.3a Fresh Blocks
on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/validate_total_score_freshblocks_v6153a.py"
      - ".github/workflows/football-v6153a-freshblocks.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile football-data/validation/validate_total_score_freshblocks_v6153a.py
      - env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/validate_total_score_freshblocks_v6153a.py
      - shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          p=football-data/manifests/v6_total_score_freshblocks_v6153a_status.json
          if [ -f "$p" ]; then git add "$p"; fi
          if ! git diff --cached --quiet; then
            git commit -m "audit(football): persist V6.15.3a fresh-block validation"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
