name: football-market-selective-opening-v550

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/config/prospective_market_selective_challenger_v526.json"
      - "football-data/validation/retrospective_market_selective_opening_v550.py"
      - ".github/workflows/football-market-selective-opening-v550.yml"

permissions:
  contents: write

concurrency:
  group: football-market-selective-opening-v550
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run fixed 0.30 opening timing robustness audit
        run: |
          python -m py_compile \
            football-data/validation/retrospective_market_all17_ceiling_v524.py \
            football-data/validation/retrospective_market_selective_opening_v550.py
          python football-data/validation/retrospective_market_selective_opening_v550.py
      - name: Commit success or diagnostic receipt
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -f football-data/manifests/retrospective_market_selective_opening_v550_status.json ]; then
            python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          p=Path('football-data/manifests/retrospective_market_selective_opening_v550_status.json')
          p.parent.mkdir(parents=True, exist_ok=True)
          p.write_text(json.dumps({
            'schema_version':'V5.5.0-retrospective-market-selective-opening-diagnostic-r1',
            'generated_at_utc':datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
            'status':'WORKFLOW_FAIL_NO_RECEIPT',
            'formal_weight_change':False,
            'probability_change':False,
            'formal_pit_market_eligible':False
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          fi
          git add -A -- football-data/manifests/retrospective_market_selective_opening_v550_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "research(football): persist opening selective market timing audit"
          git pull --rebase origin main
          git push
