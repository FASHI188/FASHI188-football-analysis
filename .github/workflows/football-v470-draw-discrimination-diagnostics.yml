name: Football V4.7 Draw Discrimination Diagnostics

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/diagnose_draw_discrimination_all_domains_v470.py"
      - "football-data/validation/backtest_last_complete_season_all_domains_v470.py"
      - ".github/workflows/football-v470-draw-discrimination-diagnostics.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v470-draw-discrimination-diagnostics
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: |
          python -m py_compile football-data/validation/backtest_last_complete_season_all_domains_v470.py
          python -m py_compile football-data/validation/diagnose_draw_discrimination_all_domains_v470.py
      - name: Run root-cause diagnostics
        id: diagnose
        shell: bash
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          set +e
          python football-data/validation/diagnose_draw_discrimination_all_domains_v470.py
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit diagnostic receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/draw_discrimination_diagnostics_v470_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist draw discrimination diagnostics"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Preserve diagnostic failure state after receipt persistence
        if: steps.diagnose.outputs.rc != '0'
        run: exit 1
