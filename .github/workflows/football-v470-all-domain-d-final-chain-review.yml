name: Football V4.7 All Domain D Final Chain Review

# First-run trigger; model-artifact commits will automatically rerun this review.
on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/review_d_conditional_candidates_v470.py"
      - "football-data/validation/review_mls_d_conditional_final_chain_v470.py"
      - "football-data/validation/train_priority_challengers_v470.py"
      - "football-data/models/challengers_v470/**/priority_v470.json"
      - "football-data/models/formal_core_v460/**/oof_matrix_calibrator.json"
      - "football-data/engine/conditional_allocation_challenger_v470.py"
      - ".github/workflows/football-v470-all-domain-d-final-chain-review.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v470-all-domain-d-final-chain-review
  cancel-in-progress: false

jobs:
  review-all-domain-candidates:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile review assets
        run: |
          python -m py_compile football-data/validation/review_mls_d_conditional_final_chain_v470.py
          python -m py_compile football-data/validation/review_d_conditional_candidates_v470.py
          python -m py_compile football-data/validation/train_priority_challengers_v470.py
          python -m py_compile football-data/engine/conditional_allocation_challenger_v470.py

      - name: Run all-domain exact deployment-chain review
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/review_d_conditional_candidates_v470.py

      - name: Commit all-domain review receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/d_conditional_all_domain_final_chain_review_v470_status.json
          if git diff --cached --quiet; then
            echo "No all-domain D review changes."
            exit 0
          fi
          git commit -m "audit(football): persist V4.7 all-domain D final-chain review"
          git pull --rebase origin main
          git push origin HEAD:main
