name: Football V5.0.1 Dynamic State Adjudication One-Shot

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/football-v501-dynamic-state-adjudication-oneshot.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  adjudicate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run replacement adjudication
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/adjudicate_bayesian_dynamic_state_v501.py
      - name: Commit adjudication receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/bayesian_dynamic_state_adjudication_v501_status.json
          git add football-data/config/bayesian_dynamic_state_shadow_registry_v501.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "governance(football): persist immediate same-day-safe adjudication"
          git pull --rebase origin main
          git push origin HEAD:main
