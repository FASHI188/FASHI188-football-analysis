name: Football V5.0.1 Bayesian Dynamic State Adjudication

on:
  push:
    branches:
      - main
    paths:
      - "football-data/manifests/bayesian_dynamic_state_oof_v501_status.json"
      - "football-data/manifests/bayesian_dynamic_state_oof_v501/**"
      - "football-data/validation/adjudicate_bayesian_dynamic_state_v501.py"
      - ".github/workflows/football-v501-bayesian-dynamic-state-adjudication.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v501-bayesian-dynamic-state-adjudication
  cancel-in-progress: true

jobs:
  adjudicate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: |
          python -m py_compile football-data/validation/adjudicate_bayesian_dynamic_state_v500.py
          python -m py_compile football-data/validation/adjudicate_bayesian_dynamic_state_v501.py
      - name: Adjudicate replacement replay
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/adjudicate_bayesian_dynamic_state_v501.py
      - name: Commit replacement adjudication
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/bayesian_dynamic_state_adjudication_v501_status.json
          git add football-data/config/bayesian_dynamic_state_shadow_registry_v501.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "governance(football): persist same-day-safe dynamic-state adjudication"
          git pull --rebase origin main
          git push origin HEAD:main
