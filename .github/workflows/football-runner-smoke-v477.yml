name: Football V4.7.7 Runner Startup Smoke

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/football-runner-smoke-v477.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-runner-smoke-v477-r2
  cancel-in-progress: true

jobs:
  runner-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Write runner-start marker without external actions
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          now=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          body=$(printf '{"status":"RUNNER_STARTED","generated_at_utc":"%s"}\n' "$now" | base64 -w0)
          payload=$(printf '{"message":"diag(football): persist runner startup marker","content":"%s","branch":"main"}' "$body")
          curl --fail-with-body -L \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/contents/football-data/manifests/runner_smoke_v477_status.json" \
            -d "$payload"

# Temporary zero-dependency diagnostic r2. Remove after runner-start status is known.
