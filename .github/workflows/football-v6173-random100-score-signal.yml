name: football-v6173-random100-score-signal
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_random100_score_signal_diagnostic_v6173.py"
      - ".github/workflows/football-v6173-random100-score-signal.yml"
permissions:
  contents: read
jobs:
  audit:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_random100_score_signal_diagnostic_v6173.py
      - run: python football-data/validation/v6_random100_score_signal_diagnostic_v6173.py
      - name: Persist receipt
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_random100_score_signal_diagnostic_v6173_status.json \
            --message-prefix "audit(football): persist V6.17.3 random100 score-signal diagnostic"
