name: football-v6-understat-xg-residual-v624-r2

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_understat_xg_residual_v624_r2.py"
      - "football-data/validation/v6_understat_fixture_alignment_audit_v6186.py"
      - "football-data/validation/v6_understat_fixture_alignment_audit_v6186r2.py"
      - "football-data/validation/v6_understat_fixture_alignment_audit_v6186r3.py"
      - "football-data/validation/v6_understat_alias_qualification_v6187.py"
      - "football-data/validation/v6_understat_alias_closure_v6188.py"
      - "football-data/validation/v6_understat_alias_freeze_v6188f.py"
      - ".github/workflows/football-v6-understat-xg-residual-v624-r2.yml"

permissions:
  contents: read

concurrency:
  group: football-v6-understat-xg-residual-v624-r2
  cancel-in-progress: true

jobs:
  validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: |
          python -m py_compile football-data/validation/v6_understat_xg_residual_v624.py
          python -m py_compile football-data/validation/v6_understat_xg_residual_v624_r2.py
      - continue-on-error: true
        run: python football-data/validation/v6_understat_xg_residual_v624_r2.py
      - if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_understat_xg_residual_v624_r2_status.json \
            --message-prefix "audit(football): persist V6.2.4 r2 Understat AJAX xG residual"

  alignment:
    needs: validate
    if: always()
    permissions: {contents: write}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: |
          python -m py_compile football-data/validation/v6_understat_fixture_alignment_audit_v6186.py
          python -m py_compile football-data/validation/v6_understat_fixture_alignment_audit_v6186r3.py
      - continue-on-error: true
        run: python football-data/validation/v6_understat_fixture_alignment_audit_v6186r3.py
        env:
          PYTHONPATH: football-data/engine:football-data/validation
      - if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_understat_fixture_alignment_audit_v6186_status.json \
            --message-prefix "audit(football): persist V6.18.6 Understat fixture alignment"

  alias_qualification:
    needs: alignment
    if: always()
    permissions: {contents: write}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_understat_alias_qualification_v6187.py
      - continue-on-error: true
        run: python football-data/validation/v6_understat_alias_qualification_v6187.py
        env:
          PYTHONPATH: football-data/engine:football-data/validation
      - if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_understat_alias_qualification_v6187_status.json \
            --message-prefix "audit(football): persist V6.18.7 deterministic Understat aliases"

  alias_closure:
    needs: alias_qualification
    if: always()
    permissions: {contents: write}
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_understat_alias_closure_v6188.py
      - continue-on-error: true
        run: python football-data/validation/v6_understat_alias_closure_v6188.py
        env:
          PYTHONPATH: football-data/engine:football-data/validation
      - if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_understat_alias_closure_v6188_status.json \
            --message-prefix "audit(football): persist V6.18.8 iterative Understat alias closure"

  alias_freeze:
    needs: alias_closure
    if: always()
    permissions: {contents: write}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_understat_alias_freeze_v6188f.py
      - run: python football-data/validation/v6_understat_alias_freeze_v6188f.py
      - env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/models/challengers_v6188/understat_aliases_v6188.json \
            --allow-prefix football-data/manifests/v6_understat_alias_freeze_v6188f_status.json \
            --message-prefix "governance(football): persist immutable V6.18.8f Understat alias freeze"
      - run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("football-data/manifests/v6_understat_alias_freeze_v6188f_status.json")
          r = json.loads(p.read_text(encoding="utf-8"))
          assert r.get("status") == "PASS", r
          assert r.get("xg_model_research_identity_gate") == "PASS", r
          print(json.dumps({k: r.get(k) for k in ["status","alias_asset_sha256","qualified_alias_count","aggregate_rate","domain_rates"]}, ensure_ascii=False))
          PY

# V6.2.4 remains research-only. V6.18.6-8.8f are identity/data governance only.
# No CURRENT/formal/runtime probability mutation is allowed by this workflow.
