name: football-v6-correctness-selector-v630
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_pooled_correctness_selector_v630.py"
      - ".github/workflows/football-v6-correctness-selector-v630.yml"
permissions:
  contents: read
jobs:
  validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_pooled_correctness_selector_v630.py
      - run: python football-data/validation/v6_pooled_correctness_selector_v630.py
      - name: Persist
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_pooled_correctness_selector_v630_status.json \
            --message-prefix "audit(football): persist V6.3.0 correctness selector"
      - name: Enforce
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('football-data/manifests/v6_pooled_correctness_selector_v630_status.json')
          if not p.exists(): raise SystemExit('receipt missing')
          x=json.loads(p.read_text())
          print(json.dumps({'status':x.get('status'),'test':x.get('newer_850_test')},ensure_ascii=False))
          PY
# Research-only second-level execution selector.
