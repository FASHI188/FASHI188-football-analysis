name: football-full-result-balance-kl-v5537

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/full_result_balance_kl_v5537.py"
      - ".github/workflows/football-full-result-balance-kl-v5537.yml"

permissions:
  contents: read

jobs:
  experiment:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile experiment
        run: python -m py_compile football-data/validation/full_result_balance_kl_v5537.py
      - name: Run full result-balance calibration
        run: python football-data/validation/full_result_balance_kl_v5537.py
      - name: Persist V5.5.37 receipt safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/full_result_balance_kl_v5537_status.json \
            --message-prefix "audit(football): persist V5.5.37 full result balance KL"

# One-time challenge experiment. No schedule and no formal/runtime mutation.
