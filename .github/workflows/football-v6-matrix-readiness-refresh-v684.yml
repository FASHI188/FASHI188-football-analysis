name: football-v6-matrix-readiness-refresh-v684
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/manifests/prospective_market_consensus_v554_status.json"
      - "football-data/evidence/market_matrix_prospective_outcomes/**"
      - "football-data/validation/prospective_market_matrix_aggregate_v548.py"
      - "football-data/config/prospective_market_matrix_validation_v548.json"
      - ".github/workflows/football-v6-matrix-readiness-refresh-v684.yml"
permissions:
  contents: read
jobs:
  refresh:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python football-data/validation/prospective_market_matrix_aggregate_v548.py
      - name: Persist readiness
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/prospective_market_matrix_validation_v548_status.json \
            --message-prefix "audit(football): refresh matrix readiness after consensus"
# Trigger revision: consensus inventory is now rebuilt from the evidence directory itself.
