name: Football V5.0.1 Dynamic State Adjudication Debug

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/football-v501-dynamic-state-adjudication-debug.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run and capture adjudication
        shell: bash
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          set +e
          python football-data/validation/adjudicate_bayesian_dynamic_state_v501.py > /tmp/adjudication.log 2>&1
          rc=$?
          mkdir -p football-data/manifests
          {
            echo "return_code=$rc"
            echo "--- output ---"
            cat /tmp/adjudication.log
          } > football-data/manifests/bayesian_dynamic_state_adjudication_v501_debug.txt
          exit 0
      - name: Commit debug log and any receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/bayesian_dynamic_state_adjudication_v501_debug.txt
          git add football-data/manifests/bayesian_dynamic_state_adjudication_v501_status.json || true
          git add football-data/config/bayesian_dynamic_state_shadow_registry_v501.json || true
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist V5.0.1 adjudication debug log"
          git pull --rebase origin main
          git push origin HEAD:main
