name: Football V6.12.8 International Duty Readiness

on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/audit_international_duty_readiness_v6128.py"
      - ".github/workflows/football-v6128-international-duty-readiness.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit international-duty readiness
        run: python football-data/validation/audit_international_duty_readiness_v6128.py
      - name: Persist receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/v6_international_duty_readiness_v6128_status.json
          git commit -m "audit(football): persist international-duty readiness"
          git pull --rebase origin main
          git push origin HEAD:main
