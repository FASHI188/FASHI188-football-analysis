name: football-v6-direct-outcome-domain-draw-prior-v602

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_direct_outcome_mvp_v600.py"
      - "football-data/validation/v6_direct_outcome_draw_boundary_v601.py"
      - "football-data/validation/v6_direct_outcome_domain_draw_prior_v602.py"
      - ".github/workflows/football-v6-direct-outcome-domain-draw-prior-v602.yml"

permissions:
  contents: read

concurrency:
  group: football-v6-direct-outcome-domain-draw-prior-v602
  cancel-in-progress: true

jobs:
  experiment:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile V6 domain draw prior
        run: |
          python -m py_compile football-data/validation/v6_direct_outcome_mvp_v600.py
          python -m py_compile football-data/validation/v6_direct_outcome_draw_boundary_v601.py
          python -m py_compile football-data/validation/v6_direct_outcome_domain_draw_prior_v602.py
      - name: Run domain draw-prior challenge
        run: python football-data/validation/v6_direct_outcome_domain_draw_prior_v602.py
      - name: Persist V6.0.2 receipt safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_direct_outcome_domain_draw_prior_v602_status.json \
            --message-prefix "audit(football): persist V6.0.2 domain draw-prior challenge"

# One-time research challenge. No schedule and no formal/runtime mutation.
