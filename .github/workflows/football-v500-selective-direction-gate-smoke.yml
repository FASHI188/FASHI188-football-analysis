name: Football V5 Selective Direction Gate Smoke

on:
  push:
    branches: [main]
    paths:
      - "football-data/manifests/v500_upgrade_status.json"
      - "football-data/manifests/promotions/ESP_LaLiga_selective_direction_v500.json"
      - "football-data/engine/selective_direction_gate_v500.py"
      - "football-data/validation/selective_direction_gate_v500_smoke.py"
      - ".github/workflows/football-v500-selective-direction-gate-smoke.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v500-selective-direction-gate-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: python -m py_compile football-data/engine/selective_direction_gate_v500.py football-data/validation/selective_direction_gate_v500_smoke.py
      - name: Run smoke
        env:
          PYTHONPATH: football-data/engine
        run: python football-data/validation/selective_direction_gate_v500_smoke.py
      - name: Commit smoke receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/selective_direction_gate_v500_smoke.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist V5 selective direction gate smoke"
          git pull --rebase origin main
          git push origin HEAD:main
