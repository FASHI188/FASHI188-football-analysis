name: Football Kalmar Malmo Question-Time Audit

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/run_kalmar_malmo_question_time_audit_20260720.py"
      - ".github/workflows/football-kalmar-malmo-question-time-audit.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-kalmar-malmo-question-time-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: python -m py_compile football-data/validation/run_kalmar_malmo_question_time_audit_20260720.py
      - name: Run formal audit and preserve failure receipt
        id: audit
        shell: bash
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          set +e
          python football-data/validation/run_kalmar_malmo_question_time_audit_20260720.py > /tmp/kalmar_malmo_audit.log 2>&1
          rc=$?
          cat /tmp/kalmar_malmo_audit.log
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" -ne 0 ]; then
            python - <<'PY'
          import json
          from pathlib import Path
          log = Path('/tmp/kalmar_malmo_audit.log').read_text(encoding='utf-8', errors='replace')
          out = Path('football-data/manifests/question_time_audits/SWE_Allsvenskan_2026-07-20_Kalmar_FF_vs_Malmo_FF.json')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps({
              'schema_version': 'V4.7.0-question-time-formal-audit-r1',
              'status': 'FAIL',
              'match': 'Kalmar FF vs Malmo FF',
              'reason': 'formal audit script failed before producing a calculation receipt',
              'log_tail': log[-12000:],
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          fi
          exit 0
      - name: Commit audit receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/question_time_audits/SWE_Allsvenskan_2026-07-20_Kalmar_FF_vs_Malmo_FF.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist Kalmar Malmo formal calculation receipt"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Preserve audit failure state after receipt persistence
        if: steps.audit.outputs.rc != '0'
        run: exit 1
