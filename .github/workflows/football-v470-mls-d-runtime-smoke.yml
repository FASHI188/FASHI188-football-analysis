name: Football V4.7 MLS D Runtime Smoke

# First-run trigger after runtime activation is hash-bound and ACTIVE.
on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/smoke_promoted_mls_d_runtime_v470.py"
      - "football-data/manifests/promotions/USA_MLS_d_conditional_v470_runtime_activation.json"
      - "football-data/manifests/promotions/USA_MLS_d_conditional_v470.json"
      - "football-data/engine/promoted_challenger_runtime_v470.py"
      - "football-data/engine/promoted_challenger_runtime_gate_v470.py"
      - "football-data/engine/run_formal_prediction_actionable.py"
      - ".github/workflows/football-v470-mls-d-runtime-smoke.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v470-mls-d-runtime-smoke
  cancel-in-progress: false

jobs:
  runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile promoted runtime assets
        run: |
          python -m py_compile football-data/engine/promoted_challenger_runtime_v470.py
          python -m py_compile football-data/engine/promoted_challenger_runtime_gate_v470.py
          python -m py_compile football-data/engine/run_formal_prediction_actionable.py
          python -m py_compile football-data/validation/smoke_promoted_mls_d_runtime_v470.py

      - name: Run promoted USA MLS D conditional runtime smoke audit
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/smoke_promoted_mls_d_runtime_v470.py

      - name: Commit runtime smoke receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/promotions/USA_MLS_d_conditional_v470_runtime_smoke.json
          if git diff --cached --quiet; then
            echo "No runtime smoke receipt changes."
            exit 0
          fi
          git commit -m "audit(football): persist promoted USA_MLS D runtime smoke receipt"
          git pull --rebase origin main
          git push origin HEAD:main
