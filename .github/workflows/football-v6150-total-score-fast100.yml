name: Football V6.15.0 Total Score Fast100
on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/validate_total_score_chain_fast100_v6150.py"
      - ".github/workflows/football-v6150-total-score-fast100.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: python -m py_compile football-data/validation/validate_total_score_chain_fast100_v6150.py
      - name: Run audit
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/validate_total_score_chain_fast100_v6150.py
      - name: Persist receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          path=football-data/manifests/v6_total_score_chain_fast100_v6150_status.json
          if [ -f "$path" ]; then git add "$path"; fi
          if ! git diff --cached --quiet; then
            git commit -m "audit(football): persist V6.15 total-score Fast100"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
