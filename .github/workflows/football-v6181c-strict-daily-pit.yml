name: football-v6181c-strict-daily-pit
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "football-data/validation/v6_strict_daily_pit_rows_v6181c.py"
      - "football-data/validation/v6_conditional_score_shot_challenge_v6184.py"
      - "football-data/validation/v6_selective_exact_score_gate_v6185.py"
      - ".github/workflows/football-v6181c-strict-daily-pit.yml"
permissions:
  contents: write
concurrency:
  group: football-v6181c-strict-daily-pit
  cancel-in-progress: true
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - name: Install dependency
        run: python -m pip install --disable-pip-version-check -q scikit-learn
      - name: Compile strict-PIT and selective-score gate
        run: |
          python -m py_compile football-data/validation/v6_strict_daily_pit_rows_v6181c.py
          python -m py_compile football-data/validation/v6_conditional_score_shot_challenge_v6184.py
          python -m py_compile football-data/validation/v6_selective_exact_score_gate_v6185.py
      - name: Reconfirm strict daily PIT total receipt
        run: python football-data/validation/v6_strict_daily_pit_rows_v6181c.py
        env:
          PYTHONPATH: football-data/engine:football-data/validation
      - name: Run V6.18.5 selective exact-score gate
        run: python football-data/validation/v6_selective_exact_score_gate_v6185.py
        env:
          PYTHONPATH: football-data/engine:football-data/validation
      - name: Persist strict-PIT and selective-score receipts
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_strict_daily_pit_total_v6181c_status.json \
            --allow-prefix football-data/manifests/v6_selective_exact_score_gate_v6185_status.json \
            --message-prefix "audit(football): persist strict-PIT total and V6.18.5 selective score gate"
