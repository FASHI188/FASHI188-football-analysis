name: football-retrospective-market-ceiling-v522

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/retrospective_market_outcome_ceiling_v522.py"
      - ".github/workflows/football-retrospective-market-ceiling-v522.yml"

permissions:
  contents: write

concurrency:
  group: football-retrospective-market-ceiling-v522
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run five-league retrospective market ceiling
        run: |
          python -m py_compile football-data/validation/retrospective_market_outcome_ceiling_v522.py
          python football-data/validation/retrospective_market_outcome_ceiling_v522.py
      - name: Commit diagnostic receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- football-data/manifests/retrospective_market_outcome_ceiling_v522_status.json
          if git diff --cached --quiet; then
            echo "No retrospective market ceiling result changed."
            exit 0
          fi
          git commit -m "research(football): persist retrospective market outcome ceiling"
          git pull --rebase origin main
          git push
