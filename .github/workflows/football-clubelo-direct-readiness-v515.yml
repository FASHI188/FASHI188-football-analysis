name: football-clubelo-direct-readiness-v515

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/clubelo_direct_api_readiness_v515.py"
      - ".github/workflows/football-clubelo-direct-readiness-v515.yml"

permissions:
  contents: write

concurrency:
  group: football-clubelo-direct-readiness-v515
  cancel-in-progress: true

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run direct API audit
        run: python football-data/validation/clubelo_direct_api_readiness_v515.py
      - name: Commit receipt
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- football-data/manifests/clubelo_direct_api_readiness_v515_status.json
          if git diff --cached --quiet; then
            echo "No ClubElo readiness receipt changed."
            exit 0
          fi
          git commit -m "research(football): persist direct ClubElo readiness"
          git pull --rebase origin main
          git push
