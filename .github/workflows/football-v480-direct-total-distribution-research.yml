name: Football V4.8 Direct Total Distribution Research

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/direct_total_distribution_challenger_v480.py"
      - "football-data/validation/run_direct_total_distribution_v480.py"
      - "football-data/validation/aggregate_direct_total_distribution_v480.py"
      - ".github/workflows/football-v480-direct-total-distribution-research.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v480-direct-total-distribution-research
  cancel-in-progress: true

jobs:
  validate-domain:
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        competition:
          - ENG_PremierLeague
          - GER_Bundesliga
          - ITA_SerieA
          - FRA_Ligue1
          - ESP_LaLiga
          - POR_PrimeiraLiga
          - NED_Eredivisie
          - SUI_SuperLeague
          - SCO_Premiership
          - SWE_Allsvenskan
          - NOR_Eliteserien
          - JPN_J1
          - KOR_KLeague1
          - BRA_SerieA
          - ARG_Primera
          - USA_MLS
          - UEFA_ChampionsLeague
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile research assets
        run: |
          python -m py_compile football-data/validation/direct_total_distribution_challenger_v480.py
          python -m py_compile football-data/validation/run_direct_total_distribution_v480.py
          python -m py_compile football-data/validation/aggregate_direct_total_distribution_v480.py

      - name: Run isolated competition research
        id: worker
        shell: bash
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          set +e
          python football-data/validation/run_direct_total_distribution_v480.py --competition "${{ matrix.competition }}"
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit isolated evidence
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "football-data/manifests/direct_total_distribution_v480/${{ matrix.competition }}.json"
          if [ -f "football-data/models/challengers_v480/${{ matrix.competition }}/direct_total_distribution.json" ]; then
            git add "football-data/models/challengers_v480/${{ matrix.competition }}/direct_total_distribution.json"
          fi
          if git diff --cached --quiet; then
            echo "No V4.8 direct-total changes for ${{ matrix.competition }}."
          else
            git commit -m "research(football): persist ${{ matrix.competition }} V4.8 direct-total evidence"
            for attempt in 1 2 3 4 5 6; do
              git pull --rebase origin main && git push origin HEAD:main && break
              if [ "$attempt" = "6" ]; then
                echo "Failed to persist ${{ matrix.competition }} after retries" >&2
                exit 1
              fi
              sleep $((attempt * 2))
            done
          fi

      - name: Preserve worker failure state
        if: steps.worker.outputs.rc != '0'
        run: exit 1

  aggregate:
    if: always()
    needs: validate-domain
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh isolated receipts
        run: git pull --rebase origin main

      - name: Aggregate current evidence
        id: aggregate
        shell: bash
        run: |
          set +e
          python football-data/validation/aggregate_direct_total_distribution_v480.py
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit aggregate receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/direct_total_distribution_v480_status.json
          if git diff --cached --quiet; then
            echo "No aggregate V4.8 direct-total changes."
          else
            git commit -m "research(football): aggregate V4.8 direct-total evidence"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Enforce complete aggregate
        if: steps.aggregate.outputs.rc != '0'
        run: exit 1
