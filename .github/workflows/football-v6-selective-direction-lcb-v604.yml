name: football-v6-selective-direction-lcb-v604

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: football-v6-selective-direction-lcb-v604
  cancel-in-progress: true

jobs:
  experiment:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile V6.0.4 selective execution challenge
        run: |
          python -m py_compile football-data/validation/v6_direct_outcome_mvp_v600.py
          python -m py_compile football-data/validation/v6_direct_outcome_draw_boundary_v601.py
          python -m py_compile football-data/validation/v6_selective_direction_lcb_v604.py
          python -m py_compile football-data/validation/v6_selective_direction_lcb_v604_r2.py
      - name: Run reduced V6.0.4 selective execution challenge
        run: python football-data/validation/v6_selective_direction_lcb_v604_r2.py
      - name: Persist V6.0.4 receipt safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_selective_direction_lcb_v604_status.json \
            --message-prefix "audit(football): persist V6.0.4 selective execution challenge"

# Frozen failed research challenge. Manual dispatch only; no formal/runtime mutation.
