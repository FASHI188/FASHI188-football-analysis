name: Football V6.12.4 Error Anatomy Fast100

on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/audit_1x2_error_anatomy_fast100_v6124.py"
      - ".github/workflows/football-v6124-error-anatomy-fast100.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run latest100 error anatomy
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/audit_1x2_error_anatomy_fast100_v6124.py
      - name: Persist receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/v6_1x2_error_anatomy_fast100_v6124_status.json
          git commit -m "audit(football): persist latest100 1X2 error anatomy"
          git pull --rebase origin main
          git push origin HEAD:main
