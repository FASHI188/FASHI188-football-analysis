name: Football V6.12.4 Error Anatomy Fast100

on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/audit_1x2_error_anatomy_fast100_v6124.py"
      - ".github/workflows/football-v6124-error-anatomy-fast100.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run latest100 error anatomy
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        shell: bash
        run: |
          set +e
          log=/tmp/v6124.log
          python football-data/validation/audit_1x2_error_anatomy_fast100_v6124.py >"$log" 2>&1
          code=$?
          cat "$log"
          echo "audit_exit_code=$code" >> "$GITHUB_ENV"
          if [ "$code" != "0" ]; then
            python - "$code" "$log" <<'PY'
          import json, pathlib, sys
          code=int(sys.argv[1]); log=pathlib.Path(sys.argv[2]).read_text(encoding="utf-8",errors="replace")
          out=pathlib.Path("football-data/manifests/v6_1x2_error_anatomy_fast100_v6124_status.json")
          out.write_text(json.dumps({"schema_version":"V6.12.4-error-anatomy-fast100-r1","status":"FAILED_EXECUTION","audit_exit_code":code,"error_log_tail":log[-12000:],"formal_probability_change":False,"formal_weight_change":False,"current_rule_change":False},ensure_ascii=False,indent=2)+"\n",encoding="utf-8")
          PY
          fi
          exit 0
      - name: Persist receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/v6_1x2_error_anatomy_fast100_v6124_status.json
          git commit -m "audit(football): persist latest100 1X2 error anatomy"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Enforce execution
        run: test "${audit_exit_code:-2}" = "0"
