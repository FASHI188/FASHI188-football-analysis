name: Football V4.6.5 Total Goals Promotion Readiness

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "football-data/validation/total_goals_promotion_readiness_v465.py"
      - "football-data/manifests/total_goals_dynamic_v464_status.json"
      - "football-data/manifests/rolling_outer_v463_status.json"
      - "football-data/manifests/final_chain_replay_v463_status.json"
      - ".github/workflows/football-total-goals-promotion-readiness-v465.yml"

permissions:
  contents: write

concurrency:
  group: football-total-goals-promotion-readiness-v465-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile readiness gate
        run: python -m py_compile football-data/validation/total_goals_promotion_readiness_v465.py

      - name: Evaluate first-round winners
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/total_goals_promotion_readiness_v465.py --print-summary

      - name: Commit readiness reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/validation/reports/total_goals_promotion_readiness_v465 football-data/manifests/total_goals_promotion_readiness_v465_status.json
          if git diff --cached --quiet; then
            echo "No readiness report changes to commit."
            exit 0
          fi
          git commit -m "model(football): refresh total-goals promotion readiness"
          git push origin HEAD:main
