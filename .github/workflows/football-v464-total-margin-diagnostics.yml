name: Football V4.6.4 Total and Margin Diagnostics

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "football-data/validation/total_goals_and_margin_diagnostics_v464.py"
      - "football-data/validation/persist_files_v474.py"
      - ".github/workflows/football-v464-total-margin-diagnostics.yml"

permissions:
  contents: read

concurrency:
  group: football-v464-total-margin-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile diagnostic and persistence helper
        run: |
          python -m py_compile football-data/validation/total_goals_and_margin_diagnostics_v464.py
          python -m py_compile football-data/validation/persist_files_v474.py

      - name: Run chronological diagnostics
        env:
          PYTHONPATH: football-data/engine
        run: python football-data/validation/total_goals_and_margin_diagnostics_v464.py

      - name: Persist diagnostic manifest safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_files_v474.py \
            football-data/manifests/total_goals_and_margin_diagnostics_v464_status.json \
            --message-prefix "audit(football): persist"

# No direct git commit/pull/rebase/push is allowed in this workflow.
