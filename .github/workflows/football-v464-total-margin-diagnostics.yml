name: Football V4.6.4 Total and Margin Diagnostics

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "football-data/validation/total_goals_and_margin_diagnostics_v464.py"
      - ".github/workflows/football-v464-total-margin-diagnostics.yml"

permissions:
  contents: write

concurrency:
  group: football-v464-total-margin-diagnostics
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run chronological diagnostics
        env:
          PYTHONPATH: football-data/engine
        run: |
          python football-data/validation/total_goals_and_margin_diagnostics_v464.py

      - name: Persist diagnostic manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/total_goals_and_margin_diagnostics_v464_status.json
          if git diff --cached --quiet; then
            echo "No diagnostic manifest changes."
            exit 0
          fi
          git commit -m "audit(football): persist V4.6.4 total and margin diagnostics [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
