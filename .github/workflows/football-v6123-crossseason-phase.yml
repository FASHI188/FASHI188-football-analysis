name: Football V6.12.3 Crossseason Phase Audit

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/validate_1x2_crossseason_phase_v6123.py"
      - ".github/workflows/football-v6123-crossseason-phase.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: python -m py_compile football-data/validation/validate_1x2_crossseason_phase_v6123.py
      - name: Run cross-season phase audit
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        shell: bash
        run: |
          set +e
          python football-data/validation/validate_1x2_crossseason_phase_v6123.py
          code=$?
          echo "validation_exit_code=$code" >> "$GITHUB_ENV"
          exit 0
      - name: Persist receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          path=football-data/manifests/v6_1x2_crossseason_phase_v6123_status.json
          if [ -f "$path" ]; then git add "$path"; fi
          if ! git diff --cached --quiet; then
            git commit -m "audit(football): persist crossseason phase stability screen"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Enforce execution pass
        run: test "${validation_exit_code:-2}" = "0"
