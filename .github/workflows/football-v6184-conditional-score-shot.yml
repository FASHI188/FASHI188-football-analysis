# retrigger-only after pre-score runtime-reference repair; research design unchanged
name: football-v6184-conditional-score-shot
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "football-data/validation/v6_conditional_score_shot_challenge_v6184.py"
      - "football-data/validation/v6_conditional_score_shot_challenge_v6184a.py"
      - "football-data/validation/v6_strict_daily_pit_rows_v6181c.py"
      - ".github/workflows/football-v6184-conditional-score-shot.yml"
permissions:
  contents: write
concurrency:
  group: football-v6184-conditional-score-shot
  cancel-in-progress: true
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - name: Install dependency
        run: python -m pip install --disable-pip-version-check -q scikit-learn
      - run: |
          python -m py_compile football-data/validation/v6_strict_daily_pit_rows_v6181c.py
          python -m py_compile football-data/validation/v6_conditional_score_shot_challenge_v6184.py
          python -m py_compile football-data/validation/v6_conditional_score_shot_challenge_v6184a.py
      - run: python football-data/validation/v6_conditional_score_shot_challenge_v6184a.py
        env:
          PYTHONPATH: football-data/engine:football-data/validation
      - name: Persist receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_conditional_score_shot_challenge_v6184_status.json \
            --message-prefix "audit(football): persist V6.18.4 strict daily PIT conditional score"
