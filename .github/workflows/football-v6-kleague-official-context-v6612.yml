name: football-v6-kleague-official-context-v6612
on:
  workflow_dispatch:
  schedule:
    - cron: "20 4 * * 2"
  push:
    paths:
      - "football-data/validation/v6_kleague_official_context_v6612.py"
      - ".github/workflows/football-v6-kleague-official-context-v6612.yml"
permissions:
  contents: read
concurrency:
  group: football-v6-kleague-official-context-v6612
  cancel-in-progress: true
jobs:
  fetch:
    permissions:
      contents: write
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - name: Compile
        run: python -m py_compile football-data/validation/v6_kleague_official_context_v6612.py
      - name: Fetch official K League roster and manager context
        run: python football-data/validation/v6_kleague_official_context_v6612.py
      - name: Persist evidence and receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/evidence/team_current_roster_weekly/kleague_current_rosters__ \
            --allow-prefix football-data/evidence/team_manager_context_weekly/kleague_managers__ \
            --allow-prefix football-data/manifests/v6_kleague_official_context_v6612_status.json \
            --message-prefix "data(football): persist V6.6.14 official K League context"
      - name: Enforce fail-closed evidence contract
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('football-data/manifests/v6_kleague_official_context_v6612_status.json')
          if not p.exists(): raise SystemExit('K League context status missing')
          x=json.loads(p.read_text())
          if x.get('status') not in {'PASS_COMPLETE','WARN_PARTIAL'}: raise SystemExit(str(x))
          if int(x.get('valid_current_roster_count') or 0)==0: raise SystemExit('no strict current K League roster evidence produced')
          if int(x.get('valid_manager_count') or 0)==0: raise SystemExit('no verified K League manager evidence produced')
          g=x.get('governance') or {}
          if g.get('official_source_only') is not True or g.get('no_cross_source_union') is not True or g.get('record_timestamp_after_all_sources') is not True: raise SystemExit('V6.6.14 K League governance missing')
          print(json.dumps({'schema':x.get('schema_version'),'status':x['status'],'target':x['team_target_count'],'rosters':x['valid_current_roster_count'],'managers':x['valid_manager_count']},ensure_ascii=False))
          PY
      - name: Dispatch authoritative derived team-context refresh
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run football-v6-team-context-overlay-validate-v668.yml --ref main
# workflow_dispatch is intentionally used because GITHUB_TOKEN-authored evidence pushes do not recursively trigger push workflows.