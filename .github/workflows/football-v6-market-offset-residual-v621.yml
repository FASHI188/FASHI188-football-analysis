name: football-v6-market-offset-residual-v621

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_market_offset_residual_v621.py"
      - ".github/workflows/football-v6-market-offset-residual-v621.yml"

permissions:
  contents: read

concurrency:
  group: football-v6-market-offset-residual-v621
  cancel-in-progress: true

jobs:
  validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile V6.2.1 challenge
        run: |
          python -m py_compile football-data/validation/v6_market_residual_fusion_v620.py
          python -m py_compile football-data/validation/v6_market_offset_residual_v621.py
      - name: Run V6.2.1 market-offset residual challenge
        id: challenge
        continue-on-error: true
        run: python football-data/validation/v6_market_offset_residual_v621.py
      - name: Persist V6.2.1 challenge receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_market_offset_residual_v621_status.json \
            --message-prefix "audit(football): persist V6.2.1 market-offset residual"
      - name: Enforce receipt
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("football-data/manifests/v6_market_offset_residual_v621_status.json")
          if not path.exists():
              raise SystemExit("V6.2.1 receipt missing")
          receipt = json.loads(path.read_text(encoding="utf-8"))
          if receipt.get("status") != "PASS":
              raise SystemExit(f"V6.2.1 failed: {receipt.get('status')}")
          result = receipt.get("result") or {}
          print(json.dumps({
              "result_status": result.get("status"),
              "row_counts": receipt.get("row_counts"),
              "market_holdout_accuracy": ((result.get("market_holdout") or {}).get("accuracy")),
              "residual_holdout_accuracy": ((result.get("residual_holdout") or {}).get("accuracy")),
              "gain_pp": result.get("accuracy_gain_pp_vs_market"),
              "proper_score_delta": result.get("proper_score_delta_vs_market"),
          }, ensure_ascii=False))
          PY

# Research challenge only; no formal/CURRENT/runtime mutation.
