name: Football V4.7 Score Total Structural Diagnostic

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/score_total_structural_diagnostic_v470.py"
      - "football-data/validation/backtest_last_complete_season_all_domains_v470.py"
      - ".github/workflows/football-v470-score-total-structural-diagnostic.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v470-score-total-structural-diagnostic
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: |
          python -m py_compile football-data/validation/backtest_last_complete_season_all_domains_v470.py
          python -m py_compile football-data/validation/score_total_structural_diagnostic_v470.py
      - name: Run structural diagnostic
        id: validate
        shell: bash
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          set +e
          python football-data/validation/score_total_structural_diagnostic_v470.py
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/score_total_structural_diagnostic_v470_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist score total structural diagnostic receipt"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Preserve validation failure after receipt persistence
        if: steps.validate.outputs.rc != '0'
        run: exit 1
