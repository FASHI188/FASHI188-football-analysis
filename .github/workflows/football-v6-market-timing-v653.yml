name: football-v6-market-timing-v653
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_opening_vs_closing_market_v653.py"
      - ".github/workflows/football-v6-market-timing-v653.yml"
permissions:
  contents: read
jobs:
  validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_opening_vs_closing_market_v653.py
      - run: python football-data/validation/v6_opening_vs_closing_market_v653.py
      - name: Persist
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_opening_vs_closing_market_v653_status.json \
            --message-prefix "audit(football): persist V6.5.3 market timing audit"
      - name: Enforce
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('football-data/manifests/v6_opening_vs_closing_market_v653_status.json')
          if not p.exists(): raise SystemExit('V653 missing')
          x=json.loads(p.read_text())
          if x.get('status')!='PASS': raise SystemExit(x.get('status'))
          print(json.dumps({'newer':x.get('newer'),'opening_gain':x.get('opening_gain_pp_vs_v6_newer'),'closing_gain':x.get('closing_gain_pp_vs_v6_newer'),'close_minus_open':x.get('closing_gain_pp_vs_opening_newer'),'opening_selector':x.get('opening_selector_newer')},ensure_ascii=False))
          PY
# Research timing audit only.
