name: football-fpl-context-challenger-v519

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/config/fpl_context_challenger_v519.json"
      - "football-data/validation/fpl_context_challenger_v519.py"
      - "football-data/validation/fpl_context_challenger_runner_v519.py"
      - ".github/workflows/football-fpl-context-challenger-v519.yml"

permissions:
  contents: write

concurrency:
  group: football-fpl-context-challenger-v519
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install numeric dependency
        run: python -m pip install "numpy>=1.26,<3"
      - name: Syntax check
        run: |
          python -m py_compile \
            football-data/validation/fpl_context_challenger_v519.py \
            football-data/validation/fpl_context_challenger_runner_v519.py
      - name: Run strict chronological FPL context shadow
        run: python football-data/validation/fpl_context_challenger_runner_v519.py
      - name: Commit evidence or execution receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -d football-data/evidence/fpl_context_v519 ]; then
            git add -A -- football-data/evidence/fpl_context_v519
          fi
          git add -A -- football-data/manifests/fpl_context_challenger_v519_status.json
          if git diff --cached --quiet; then
            echo "No FPL context result changed."
            exit 0
          fi
          git commit -m "research(football): persist FPL context challenger"
          git pull --rebase origin main
          git push
