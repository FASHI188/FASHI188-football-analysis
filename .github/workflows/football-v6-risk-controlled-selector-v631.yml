name: football-v6-risk-controlled-selector-v631
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_risk_controlled_selector_v631.py"
      - ".github/workflows/football-v6-risk-controlled-selector-v631.yml"
permissions:
  contents: read
jobs:
  validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_risk_controlled_selector_v631.py
      - run: python football-data/validation/v6_risk_controlled_selector_v631.py
      - name: Persist
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_risk_controlled_selector_v631_status.json \
            --message-prefix "audit(football): persist V6.3.1 Wilson risk selector"
      - name: Enforce
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('football-data/manifests/v6_risk_controlled_selector_v631_status.json')
          if not p.exists(): raise SystemExit('receipt missing')
          print(json.dumps(json.loads(p.read_text()),ensure_ascii=False))
          PY
# Research-only risk-controlled selector.
