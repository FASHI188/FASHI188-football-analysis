name: football-v6-pristine-forward-audit-v613

on:
  workflow_dispatch:
  schedule:
    - cron: "42 */3 * * *"
  push:
    paths:
      - "football-data/validation/v6_pristine_forward_audit_v613.py"
      - "football-data/validation/v6_pristine_forward_evaluate_v611_r3.py"
      - "football-data/validation/v6_pristine_forward_probability_audit_v614.py"
      - "football-data/forward/v6_pristine_forward_events_v612.json"
      - "football-data/forward/inbox/fixtures_v612.json"
      - "football-data/evidence/markets_prospective/**"
      - ".github/workflows/football-v6-pristine-forward-audit-v613.yml"

permissions:
  contents: read

concurrency:
  group: football-v6-pristine-forward-audit-v613
  cancel-in-progress: false

jobs:
  audit:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile V6.1.3 audit, audit-aware evaluator and proper-score audit
        run: |
          python -m py_compile football-data/validation/v6_pristine_forward_audit_v613.py
          python -m py_compile football-data/validation/v6_pristine_forward_ledger_v612.py
          python -m py_compile football-data/validation/v6_pristine_forward_evaluate_v611_r2.py
          python -m py_compile football-data/validation/v6_pristine_forward_evaluate_v611_r3.py
          python -m py_compile football-data/validation/v6_pristine_forward_probability_audit_v614.py
      - name: Verify V6.1.3 audit-chain tamper detection
        run: python football-data/validation/v6_pristine_forward_audit_v613.py --self-test
      - name: Run V6.1.3 integrity and drift audit
        id: audit
        continue-on-error: true
        run: python football-data/validation/v6_pristine_forward_audit_v613.py
      - name: Run V6.1.1 audit-aware forward evaluation
        id: evaluate
        continue-on-error: true
        run: python football-data/validation/v6_pristine_forward_evaluate_v611_r3.py
      - name: Run V6.1.4 ledger-native proper-score audit
        id: probability_audit
        continue-on-error: true
        run: python football-data/validation/v6_pristine_forward_probability_audit_v614.py
      - name: Persist V6.1.3, V6.1.1 and V6.1.4 receipts
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_pristine_forward_audit_baseline_v613.json \
            --allow-prefix football-data/forward/v6_pristine_forward_audit_events_v613.json \
            --allow-prefix football-data/manifests/v6_pristine_forward_audit_v613_status.json \
            --allow-prefix football-data/manifests/v6_pristine_forward_evaluation_v611_status.json \
            --allow-prefix football-data/manifests/v6_pristine_forward_probability_audit_v614_status.json \
            --message-prefix "audit(football): persist V6.1.3/V6.1.1/V6.1.4 forward audits"
      - name: Enforce V6.1.3, V6.1.1 and V6.1.4 global gates
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          audit_path=Path('football-data/manifests/v6_pristine_forward_audit_v613_status.json')
          eval_path=Path('football-data/manifests/v6_pristine_forward_evaluation_v611_status.json')
          prob_path=Path('football-data/manifests/v6_pristine_forward_probability_audit_v614_status.json')
          for path in (audit_path,eval_path,prob_path):
              if not path.exists(): raise SystemExit(f'missing required forward receipt: {path}')
          audit=json.loads(audit_path.read_text()); evaluation=json.loads(eval_path.read_text()); prob=json.loads(prob_path.read_text())
          audit_status=str(audit.get('status') or '')
          if audit_status.startswith('FAIL_'): raise SystemExit(f'V6.1.3 global gate failed: {audit_status}')
          if evaluation.get('status')!='PASS': raise SystemExit(f"V6.1.1 evaluation gate failed: {evaluation.get('status')}")
          if prob.get('status')!='PASS': raise SystemExit(f"V6.1.4 probability audit failed: {prob.get('status')}")
          if prob.get('v613_audit_generated_at_utc')!=audit.get('generated_at_utc'): raise SystemExit('V6.1.4 did not use current-run V6.1.3 audit')
          g=prob.get('governance') or {}
          if g.get('strictly_proper_scores_primary_for_probability_quality') is not True or g.get('postmatch_prediction_reconstruction') is not False: raise SystemExit('proper-score governance missing')
          print(json.dumps({'audit_status':audit_status,'invalidated_match_count':audit.get('invalidated_match_count'),'evaluation_status':evaluation.get('evaluation_status'),'completed_forward_match_count':evaluation.get('completed_forward_match_count'),'probability_audit_status':prob.get('evaluation_status'),'stored_pick':prob.get('stored_decision_pick'),'pooled':(prob.get('probability_models') or {}).get('pooled')},ensure_ascii=False))
          PY

# Research-forward audits only. Sequence is V6.1.3 integrity -> V6.1.1 selection evaluation -> V6.1.4 proper-score quality.
# None of these steps mutates CURRENT, formal runtime probabilities or weights.