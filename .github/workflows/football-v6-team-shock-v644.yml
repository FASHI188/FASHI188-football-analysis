name: football-v6-team-shock-v644
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_team_shock_residual_v644.py"
      - ".github/workflows/football-v6-team-shock-v644.yml"
permissions:
  contents: read
jobs:
  validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_team_shock_residual_v644.py
      - run: python football-data/validation/v6_team_shock_residual_v644.py
      - name: Persist
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_team_shock_residual_v644_status.json \
            --message-prefix "audit(football): persist V6.4.4 team shock residual"
      - name: Enforce
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('football-data/manifests/v6_team_shock_residual_v644_status.json')
          if not p.exists(): raise SystemExit('V644 missing')
          x=json.loads(p.read_text())
          print(json.dumps({'gain':x.get('accuracy_gain_pp'),'away_gain':x.get('away_precision_gain_pp'),'guard':x.get('proper_score_guard'),'gate':x.get('research_gate_passed')},ensure_ascii=False))
          PY
# Research only.
