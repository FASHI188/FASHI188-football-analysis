name: football-statsbomb-open-event-readiness-v509

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/statsbomb_open_event_readiness_v509.py"
      - ".github/workflows/football-statsbomb-open-event-readiness-v509.yml"

permissions:
  contents: write

concurrency:
  group: football-statsbomb-open-event-readiness-v509
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit official open-event coverage and PIT safety
        run: |
          python -m py_compile football-data/validation/statsbomb_open_event_readiness_v509.py
          python football-data/validation/statsbomb_open_event_readiness_v509.py \
            --print-summary

      - name: Commit source audit receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/statsbomb_open_event_readiness_v509_status.json
          if git diff --cached --quiet; then
            echo "No source audit receipt changed."
            exit 0
          fi
          git commit -m "audit(football): persist StatsBomb open-event readiness"
          git pull --rebase origin main
          git push
