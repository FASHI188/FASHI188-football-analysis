name: Football V4.7.7 Action Runtime Repair

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/football-action-runtime-repair-v477.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: football-action-runtime-repair-v477-r4
  cancel-in-progress: false

jobs:
  repair-action-versions:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Repair unsupported action-version references
        shell: bash
        run: |
          set -euo pipefail
          find .github/workflows -type f \( -name '*.yml' -o -name '*.yaml' \) -print0 | \
            xargs -0 sed -i \
              -e 's#actions/setup-python@v6#actions/setup-python@v5#g' \
              -e 's#actions/upload-artifact@v7#actions/upload-artifact@v4#g' \
              -e 's#actions/download-artifact@v8#actions/download-artifact@v5#g'

          python3 - <<'PY'
          from pathlib import Path
          path = Path('football-data/validation/workflow_stability_audit_v474.py')
          text = path.read_text(encoding='utf-8')
          start = text.index('DEPRECATED_ACTION_PATTERNS = {')
          end = text.index('\n}\n', start) + 3
          replacement = '''DEPRECATED_ACTION_PATTERNS = {
    "actions/checkout@v4": "actions/checkout@v6",
    "actions/setup-python@v4": "actions/setup-python@v5",
    "actions/upload-artifact@v3": "actions/upload-artifact@v4",
    "actions/download-artifact@v4": "actions/download-artifact@v5",
}'''
          path.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
          PY

          if grep -R -n -E 'actions/setup-python@v6|actions/upload-artifact@v7|actions/download-artifact@v8' .github/workflows; then
            echo 'Unsupported action references remain.'
            exit 2
          fi

      - name: Commit repaired versions once
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows football-data/validation/workflow_stability_audit_v474.py
          if git diff --cached --quiet; then
            echo 'No action-version changes required.'
            exit 0
          fi
          git commit -m "repair(football): use officially supported GitHub Action versions"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 2))
          done
          echo 'Failed to persist Action runtime repair after 5 attempts.'
          exit 2

# One-time repair only. Remove after the repair commit lands.
