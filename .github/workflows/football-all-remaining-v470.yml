name: Football V4.7.0 All Remaining Actionable Work

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/football-all-remaining-v470.yml"
      - "football-data/config/stage_format_registry_v470.json"
      - "football-data/validation/stage_gate_resolution_v470.py"
      - "football-data/validation/active_league_promotion_review_v470.py"
      - "football-data/validation/remaining_work_v470.py"
      - "football-data/validation/repository_integrity_runtime_v473.py"
      - "football-data/validation/persist_generated_worktree_v474.py"

permissions:
  contents: read

concurrency:
  group: football-all-remaining-v470-${{ github.ref }}
  cancel-in-progress: true

jobs:
  execute-all-actionable:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Repository-wide fail-closed preflight
        run: python football-data/validation/repository_integrity_runtime_v473.py --strict-exit --print-summary

      - name: Compile V4.7.0 additions OOS runners and persistence helper
        run: |
          python -m py_compile football-data/validation/stage_gate_resolution_v470.py
          python -m py_compile football-data/validation/active_league_promotion_review_v470.py
          python -m py_compile football-data/validation/remaining_work_v470.py
          python -m py_compile football-data/validation/total_goals_dynamic_challenger_v464.py
          python -m py_compile football-data/validation/total_goals_round2_v465.py
          python -m py_compile football-data/validation/total_goals_joint_integration_v466.py
          python -m py_compile football-data/validation/persist_generated_worktree_v474.py

      - name: Resolve official stage routing where evidence supports it
        run: python football-data/validation/stage_gate_resolution_v470.py

      - name: Refresh active current-season route audit
        run: python football-data/validation/current_season_batch1_v468.py --print-summary

      - name: Re-run direct-total rolling OOS round 1
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/total_goals_dynamic_challenger_v464.py --print-summary

      - name: Re-run direct-total rolling OOS round 2
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/total_goals_round2_v465.py --print-summary

      - name: Re-run joint integration OOS gate
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/total_goals_joint_integration_v466.py --print-summary

      - name: Consolidate four active-league promotion reviews
        run: python football-data/validation/active_league_promotion_review_v470.py

      - name: Run fail-closed A-grade audit across all registered competitions
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from a_grade_auditor_v463 import audit_competition
          from platform_core import load_registry

          results = {}
          receipts = []
          for item in load_registry()["competitions"]:
              cid = item["competition_id"]
              result = audit_competition(cid, write=True)
              status = result.get("promotion_status")
              results[cid] = {
                  "promotion_status": status,
                  "failed_checks": result.get("failed_checks", []),
              }
              if status in {"A_GRADE", "A_GRADE_RECEIPT", "PROMOTED_A"}:
                  receipts.append(cid)
          payload = {
              "schema_version": "V4.7.0-a-grade-batch-audit",
              "competition_count": len(results),
              "a_grade_receipt_count": len(receipts),
              "a_grade_receipt_competitions": receipts,
              "formal_weight_change": False,
              "automatic_promotion": False,
              "results": results,
          }
          path = Path("football-data/manifests/a_grade_batch_v470_status.json")
          path.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(json.dumps({"competition_count": len(results), "a_grade_receipt_count": len(receipts)}, ensure_ascii=False, indent=2))
          PY

      - name: Consolidate remaining-work status
        run: python football-data/validation/remaining_work_v470.py

      - name: Persist validated V4.7.0 evidence safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --branch main \
            --allow-prefix football-data/manifests/ \
            --allow-prefix football-data/validation/reports/ \
            --message-prefix "audit(football): persist validated V4.7 remaining-work artifact"

# V4.7.4 hardening: all validation must finish before persistence. Generated
# evidence is allowlisted and written with optimistic Contents API concurrency;
# no direct git commit/pull/rebase/push occurs inside this workflow.
