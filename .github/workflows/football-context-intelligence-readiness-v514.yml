name: football-context-intelligence-readiness-v514

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/config/context_intelligence_source_registry_v514.json"
      - "football-data/validation/context_intelligence_source_readiness_v514.py"
      - ".github/workflows/football-context-intelligence-readiness-v514.yml"

permissions:
  contents: write

concurrency:
  group: football-context-intelligence-readiness-v514
  cancel-in-progress: true

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bounded open-source tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install "soccerdata==1.9.0" "socceraction==1.5.3"
      - name: Syntax check
        run: python -m py_compile football-data/validation/context_intelligence_source_readiness_v514.py
      - name: Run readiness audit
        run: python football-data/validation/context_intelligence_source_readiness_v514.py
      - name: Commit readiness receipt
        if: always()
        run: |
          find football-data -type d -name __pycache__ -prune -exec rm -rf {} +
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- football-data/manifests/context_intelligence_source_readiness_v514_status.json
          if git diff --cached --quiet; then
            echo "No context-intelligence readiness receipt changed."
            exit 0
          fi
          git commit -m "research(football): persist context intelligence source readiness"
          git pull --rebase origin main
          git push
