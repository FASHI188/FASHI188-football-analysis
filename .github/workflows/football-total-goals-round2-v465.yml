name: Football V4.6.5 Total Goals Round2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "football-data/validation/total_goals_round2_v465.py"
      - ".github/workflows/football-total-goals-round2-v465.yml"

permissions:
  contents: write

concurrency:
  group: football-total-goals-round2-v465-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-round2:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile round2 challenger
        run: python -m py_compile football-data/validation/total_goals_round2_v465.py

      - name: Run seven-domain round2 validation
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/total_goals_round2_v465.py --print-summary

      - name: Commit round2 reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/validation/reports/total_goals_round2_v465 football-data/manifests/total_goals_round2_v465_status.json
          if git diff --cached --quiet; then
            echo "No round2 report changes to commit."
            exit 0
          fi
          git commit -m "model(football): validate V4.6.5 total-goals round2"
          git pull --rebase origin main
          git push origin HEAD:main
