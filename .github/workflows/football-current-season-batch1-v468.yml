name: Football V4.6.8 Current Season Batch1

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/football-current-season-batch1-v468.yml"
      - "football-data/validation/current_season_batch1_v468.py"
      - "football-data/validation/persist_files_v474.py"
      - "football-data/config/platform_registry.json"
      - "football-data/league_profiles/SWE_Allsvenskan/profile.json"
      - "football-data/league_profiles/NOR_Eliteserien/profile.json"
      - "football-data/league_profiles/KOR_KLeague1/profile.json"
      - "football-data/league_profiles/BRA_SerieA/profile.json"
      - "football-data/league_profiles/ARG_Primera/profile.json"
      - "football-data/league_profiles/USA_MLS/profile.json"

permissions:
  contents: read

concurrency:
  group: football-current-season-batch1-v468-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-batch1:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Repository integrity preflight
        run: python football-data/validation/repository_integrity_runtime_v473.py --strict-exit --print-summary

      - name: Compile batch audit and persistence helper
        run: |
          python -m py_compile football-data/validation/current_season_batch1_v468.py
          python -m py_compile football-data/validation/persist_files_v474.py

      - name: Run active current-season batch1 audit
        run: python football-data/validation/current_season_batch1_v468.py --print-summary

      - name: Persist batch1 audit receipt safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_files_v474.py \
            football-data/manifests/current_season_batch1_v468_status.json \
            --message-prefix "audit(football): persist current-season batch1 receipt"

# V4.7.4 hardening: audit must pass before receipt persistence; no direct git
# commit/pull/rebase/push occurs inside this workflow.
