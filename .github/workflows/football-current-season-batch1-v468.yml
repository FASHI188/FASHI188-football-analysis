name: Football V4.6.8 Current Season Batch1

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/football-current-season-batch1-v468.yml"
      - "football-data/validation/current_season_batch1_v468.py"
      - "football-data/config/platform_registry.json"
      - "football-data/league_profiles/SWE_Allsvenskan/profile.json"
      - "football-data/league_profiles/NOR_Eliteserien/profile.json"
      - "football-data/league_profiles/KOR_KLeague1/profile.json"
      - "football-data/league_profiles/BRA_SerieA/profile.json"
      - "football-data/league_profiles/ARG_Primera/profile.json"
      - "football-data/league_profiles/USA_MLS/profile.json"

permissions:
  contents: write

concurrency:
  group: football-current-season-batch1-v468-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-batch1:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile batch audit
        run: python -m py_compile football-data/validation/current_season_batch1_v468.py

      - name: Run active current-season batch1 audit
        run: python football-data/validation/current_season_batch1_v468.py --print-summary

      - name: Persist batch1 audit receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/current_season_batch1_v468_status.json
          if git diff --cached --quiet; then
            echo "No V4.6.8 batch1 audit changes to commit."
            exit 0
          fi
          git commit -m "audit(football): persist V4.6.8 current-season batch1 receipt [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
