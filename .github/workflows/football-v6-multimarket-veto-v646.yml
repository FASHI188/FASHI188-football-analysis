name: football-v6-multimarket-veto-v646
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_multimarket_risk_veto_v646.py"
      - ".github/workflows/football-v6-multimarket-veto-v646.yml"
permissions:
  contents: read
jobs:
  validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_multimarket_risk_veto_v646.py
      - run: python football-data/validation/v6_multimarket_risk_veto_v646.py
      - name: Persist
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_multimarket_risk_veto_v646_status.json \
            --message-prefix "audit(football): persist V6.4.6 multi-market risk veto"
      - name: Enforce
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('football-data/manifests/v6_multimarket_risk_veto_v646_status.json')
          if not p.exists(): raise SystemExit('V646 missing')
          x=json.loads(p.read_text())
          print(json.dumps({'status':x.get('status'),'rule':x.get('selected_veto_rule'),'test':x.get('holdout_veto_result'),'benchmark':x.get('confidence_only_holdout')},ensure_ascii=False))
          PY
# Selective research only; base probabilities remain unchanged. Retriggered on established workflow.
