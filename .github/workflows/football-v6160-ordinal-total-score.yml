name: Football V6.16 Ordinal Total and Conditional Score
on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/validate_ordinal_total_conditional_score_v6160.py"
      - ".github/workflows/football-v6160-ordinal-total-score.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install research dependency
        run: python -m pip install --quiet scikit-learn
      - name: Compile
        run: python -m py_compile football-data/validation/validate_ordinal_total_conditional_score_v6160.py
      - name: Run challenger
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/validate_ordinal_total_conditional_score_v6160.py
      - name: Persist receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          p=football-data/manifests/v6_ordinal_total_conditional_score_v6160_status.json
          if [ -f "$p" ]; then git add "$p"; fi
          if ! git diff --cached --quiet; then
            git commit -m "audit(football): persist V6.16 ordinal total-score challenger"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
