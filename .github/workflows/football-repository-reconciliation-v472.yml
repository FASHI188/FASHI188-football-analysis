name: Football V4.7.2 Cross-Repository Reconciliation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/football-repository-reconciliation-v472.yml"
      - "football-data/validation/repository_snapshot_manifest_v472.py"
      - "football-data/validation/repository_reconciliation_v472.py"

permissions:
  contents: write

concurrency:
  group: football-repository-reconciliation-v472-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile reconciliation tooling
        run: |
          python -m py_compile football-data/validation/repository_snapshot_manifest_v472.py
          python -m py_compile football-data/validation/repository_reconciliation_v472.py

      - name: Refresh target snapshot manifest
        run: python football-data/validation/repository_snapshot_manifest_v472.py

      - name: Import frozen HHH1 source snapshot
        uses: FASHI188/HHH1/.github/actions/export-football-snapshot-v472@main
        with:
          output-path: source_repository_snapshot_v472.json

      - name: Compare source and target by path, size and SHA-256
        run: |
          python football-data/validation/repository_reconciliation_v472.py \
            --source source_repository_snapshot_v472.json \
            --target football-data/manifests/repository_snapshot_v472.json \
            --output football-data/manifests/repository_reconciliation_v472_status.json \
            --strict

      - name: Persist reconciliation receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/repository_snapshot_v472.json
          git add football-data/manifests/repository_reconciliation_v472_status.json
          if git diff --cached --quiet; then
            echo "No reconciliation changes to commit."
            exit 0
          fi
          git commit -m "audit(football): persist V4.7.2 cross-repository reconciliation [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
