name: Football V4.7 Dynamic Strength Identity Smoke

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/dynamic_strength_oof_screen_v470.py"
      - "football-data/validation/smoke_dynamic_strength_identity_v470.py"
      - ".github/workflows/football-v470-dynamic-strength-identity-smoke.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v470-dynamic-strength-identity-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: |
          python -m py_compile football-data/validation/dynamic_strength_oof_screen_v470.py
          python -m py_compile football-data/validation/smoke_dynamic_strength_identity_v470.py
      - name: Run identity smoke
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/smoke_dynamic_strength_identity_v470.py
      - name: Commit receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/dynamic_strength_identity_v470_smoke.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist dynamic-strength identity smoke"
          git pull --rebase origin main
          git push origin HEAD:main
