name: Football V5 Selective Direction Runtime Smoke

on:
  push:
    branches:
      - main
    paths:
      - "football-data/engine/selective_direction_gate_v500.py"
      - "football-data/engine/run_formal_prediction_actionable.py"
      - "football-data/manifests/v500_upgrade_status.json"
      - "football-data/manifests/promotions/ESP_LaLiga_selective_direction_v500.json"
      - "football-data/manifests/promotions/ESP_LaLiga_selective_direction_v500_selection.json"
      - "football-data/manifests/promotions/ESP_LaLiga_selective_direction_v500_runtime_activation.json"
      - "football-data/validation/smoke_selective_direction_runtime_v500.py"
      - ".github/workflows/football-v500-selective-direction-runtime-smoke.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v500-selective-direction-runtime-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: |
          python -m py_compile football-data/engine/selective_direction_gate_v500.py
          python -m py_compile football-data/engine/run_formal_prediction_actionable.py
          python -m py_compile football-data/validation/smoke_selective_direction_runtime_v500.py
      - name: Run hash-bound runtime smoke
        id: smoke
        shell: bash
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          set +e
          python football-data/validation/smoke_selective_direction_runtime_v500.py
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit smoke receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/promotions/ESP_LaLiga_selective_direction_v500_runtime_smoke.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist V5 selective direction runtime smoke"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Preserve smoke failure after receipt persistence
        if: steps.smoke.outputs.rc != '0'
        run: exit 1
