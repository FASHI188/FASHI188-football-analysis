name: Football Data Norway

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "football-data/config/league_source_norway.json"
      - "football-data/engine/ingest_norway.py"
      - "football-data/validation/persist_generated_worktree_v474.py"
      - "football-data/tests/test_ingest_norway.py"
      - ".github/workflows/football-data-norway.yml"
  pull_request:
    branches: [main]
    paths:
      - "football-data/config/league_source_norway.json"
      - "football-data/engine/ingest_norway.py"
      - "football-data/validation/persist_generated_worktree_v474.py"
      - "football-data/tests/test_ingest_norway.py"
      - ".github/workflows/football-data-norway.yml"
  schedule:
    - cron: "27 3 * * 1,4"

permissions:
  contents: read

concurrency:
  group: football-data-norway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ingest:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Repository integrity preflight
        run: python football-data/validation/repository_integrity_runtime_v473.py --strict-exit --print-summary

      - name: Compile ingestion and persistence helper
        run: |
          python -m py_compile football-data/engine/ingest_norway.py
          python -m py_compile football-data/validation/persist_generated_worktree_v474.py

      - name: Test Norway ingestion
        run: python -m unittest football-data/tests/test_ingest_norway.py -v

      - name: Ingest Norway archive
        run: python football-data/engine/ingest_norway.py --print-summary

      - name: Verify Norway profile
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          profile = json.loads(Path("football-data/league_profiles/NOR_Eliteserien/profile.json").read_text(encoding="utf-8"))
          assert profile["matches"] >= 1200
          assert abs(sum(profile["result_distribution"].values()) - 1.0) <= 1e-6
          assert abs(sum(profile["total_goals_0_7plus"].values()) - 1.0) <= 1e-6
          assert set(profile["seasons"]) == {"2021", "2022", "2023", "2024", "2025", "2026"}
          PY

      - name: Persist refreshed Norway data safely
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --branch main \
            --allow-prefix football-data/raw/NOR_Eliteserien/ \
            --allow-prefix football-data/processed/NOR_Eliteserien/ \
            --allow-prefix football-data/league_profiles/NOR_Eliteserien/ \
            --allow-prefix football-data/manifests/ \
            --message-prefix "data(football): persist validated Norway artifact"

# V4.7.4 hardening: no direct git commit/pull/rebase/push; PRs validate read-only.
