name: football-v6-pristine-forward-freeze-v610

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: football-v6-pristine-forward-freeze-v610
  cancel-in-progress: true

jobs:
  verify-locked-freeze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify immutable V6.1.0 freeze receipt
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("football-data/manifests/v6_pristine_forward_freeze_v610_status.json")
          if not path.exists():
              raise SystemExit("locked V6.1.0 freeze receipt is missing")
          payload = json.loads(path.read_text(encoding="utf-8"))
          if payload.get("status") != "PASS":
              raise SystemExit("locked V6.1.0 freeze receipt is not PASS")
          if payload.get("freeze_timestamp_utc") != "2026-07-22T07:30:51+00:00":
              raise SystemExit("V6.1.0 freeze timestamp changed")
          if payload.get("forward_start_date_utc") != "2026-07-23":
              raise SystemExit("V6.1.0 forward start date changed")
          if payload.get("training_row_count") != 18464:
              raise SystemExit("V6.1.0 frozen training row count changed")
          print("V6.1.0 pristine forward freeze remains locked")
          PY

# Locked verification only. This workflow cannot regenerate or mutate the freeze bundle.
