name: football-v6-pristine-forward-freeze-v610

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_pristine_forward_freeze_v610.py"
      - ".github/workflows/football-v6-pristine-forward-freeze-v610.yml"

permissions:
  contents: read

concurrency:
  group: football-v6-pristine-forward-freeze-v610
  cancel-in-progress: true

jobs:
  freeze:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile V6.1.0 forward freeze
        run: python -m py_compile football-data/validation/v6_pristine_forward_freeze_v610.py
      - name: Build pristine forward freeze bundle
        run: python football-data/validation/v6_pristine_forward_freeze_v610.py
      - name: Persist V6.1.0 freeze receipt safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_pristine_forward_freeze_v610_status.json \
            --message-prefix "audit(football): persist V6.1.0 pristine forward freeze"

# One-time freeze workflow. No formal/runtime mutation and no automatic promotion.
