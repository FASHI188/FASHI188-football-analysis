name: football-v6-sampled-asymmetric-65-v626

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_sampled_asymmetric_65_gate_v626.py"
      - ".github/workflows/football-v6-sampled-asymmetric-65-v626.yml"

permissions:
  contents: read

concurrency:
  group: football-v6-sampled-asymmetric-65-v626
  cancel-in-progress: true

jobs:
  validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile
        run: |
          python -m py_compile football-data/validation/v6_sampled_17domain_gate_v625_r2.py
          python -m py_compile football-data/validation/v6_sampled_asymmetric_65_gate_v626.py
      - name: Run V6.2.6
        id: challenge
        continue-on-error: true
        run: python football-data/validation/v6_sampled_asymmetric_65_gate_v626.py
      - name: Persist receipt
        if: always()
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_sampled_asymmetric_65_gate_v626_status.json \
            --message-prefix "audit(football): persist V6.2.6 asymmetric 65pct gate"
      - name: Enforce receipt
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("football-data/manifests/v6_sampled_asymmetric_65_gate_v626_status.json")
          if not p.exists():
              raise SystemExit("V6.2.6 receipt missing")
          r = json.loads(p.read_text(encoding="utf-8"))
          if r.get("status") != "PASS":
              raise SystemExit(r.get("status"))
          print(json.dumps(r.get("newer_850_test"), ensure_ascii=False))
          PY

# Research-only fast gate. No CURRENT/formal/runtime/V6.1 pristine-forward mutation.
# Retriggered after workflow was established on the default branch.
