name: Football V6.12.6 Game Events Schema

on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/audit_game_events_schema_v6126.py"
      - ".github/workflows/football-v6126-game-events-schema.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit game-events schema
        run: python football-data/validation/audit_game_events_schema_v6126.py
      - name: Persist receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/v6_game_events_schema_v6126_status.json
          git commit -m "audit(football): persist game-events schema"
          git pull --rebase origin main
          git push origin HEAD:main
