name: football-v6-system-issue-registry-v690
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_system_issue_registry_v690.py"
      - ".github/workflows/football-v6-system-issue-registry-v690.yml"
      - "football-data/manifests/v501_upgrade_status.json"
      - "football-data/manifests/v6_market_first_forward_evaluation_v651_status.json"
      - "football-data/manifests/v6_draw_resolution_registry_v674_status.json"
      - "football-data/manifests/v6_team_configuration_fetch_v660_status.json"
      - "football-data/manifests/v6_team_configuration_weekly_v660_status.json"
      - "football-data/manifests/v6_full_market_ladder_v680_status.json"
      - "football-data/manifests/v6_total_ladder_identifiability_v681_status.json"
      - "football-data/manifests/v6_multiline_market_matrix_projection_v682_status.json"
      - "football-data/manifests/v6_market_consensus_refresh_v683_status.json"
      - "football-data/manifests/prospective_market_matrix_validation_v548_status.json"
permissions:
  contents: read
jobs:
  audit:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_system_issue_registry_v690.py
      - run: python football-data/validation/v6_system_issue_registry_v690.py
      - name: Persist registry
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_system_issue_registry_v690_status.json \
            --message-prefix "audit(football): persist V6.9.0 full-system issue registry"
      - name: Enforce
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('football-data/manifests/v6_system_issue_registry_v690_status.json')
          if not p.exists(): raise SystemExit('V690 registry missing')
          x=json.loads(p.read_text())
          if x.get('status')!='PASS_NO_KNOWN_OPEN_CODE_DEFECTS': raise SystemExit(str(x))
          if x.get('formal_current_version')!='V5.0.1': raise SystemExit(str({'formal_current_version':x.get('formal_current_version')}))
          print(json.dumps({'status':x['status'],'formal_current_version':x['formal_current_version'],'issue_counts':x['issue_counts'],'blockers':x['formal_upgrade_blockers']},ensure_ascii=False))
          PY
# V5.0.1 is the active CURRENT maintenance release; V6 research remains independently gated.
