name: football-v6-system-issue-registry-v690
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_system_issue_registry_v690.py"
      - ".github/workflows/football-v6-system-issue-registry-v690.yml"
      - "football-data/manifests/v501_upgrade_status.json"
      - "football-data/manifests/v6_market_first_forward_evaluation_v651_status.json"
      - "football-data/manifests/v6_draw_resolution_registry_v674_status.json"
      - "football-data/manifests/v6_team_configuration_fetch_v660_status.json"
      - "football-data/manifests/v6_team_roster_repair_v664_status.json"
      - "football-data/manifests/v6_team_configuration_weekly_v660_status.json"
      - "football-data/manifests/v6_current_roster_overlay_v669_status.json"
      - "football-data/manifests/v6_team_context_effective_v6610_status.json"
      - "football-data/manifests/v6_roster_gap_inventory_v6611_status.json"
      - "football-data/manifests/v6_full_market_ladder_v680_status.json"
      - "football-data/manifests/v6_total_ladder_identifiability_v681_status.json"
      - "football-data/manifests/v6_multiline_market_matrix_projection_v682_status.json"
      - "football-data/manifests/v6_market_consensus_refresh_v683_status.json"
      - "football-data/manifests/prospective_market_matrix_validation_v548_status.json"
      - "football-data/manifests/v6_multiline_matrix_forward_freeze_v685_status.json"
      - "football-data/manifests/v6_multiline_matrix_forward_v685_status.json"
permissions:
  contents: read
jobs:
  audit:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_system_issue_registry_v690.py
      - run: python football-data/validation/v6_system_issue_registry_v690.py
      - name: Persist registry
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_system_issue_registry_v690_status.json \
            --message-prefix "audit(football): persist V6.9.4 full-system issue registry"
      - name: Enforce
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('football-data/manifests/v6_system_issue_registry_v690_status.json')
          if not p.exists(): raise SystemExit('V690 registry missing')
          x=json.loads(p.read_text())
          if x.get('status')!='PASS_NO_KNOWN_OPEN_CODE_DEFECTS': raise SystemExit(str(x))
          if x.get('formal_current_version')!='V5.0.1': raise SystemExit(str({'formal_current_version':x.get('formal_current_version')}))
          g=x.get('governance') or {}; summary=x.get('team_context_summary') or {}; states=summary.get('states') or {}
          if g.get('postmatch_reprojection_is_a_closed_engineering_defect') is not True: raise SystemExit('V6.8.5 closure missing')
          if g.get('four_state_roster_context_is_authoritative') is not True: raise SystemExit('four-state roster authority missing')
          if g.get('only_strict_current_satisfies_roster_gate') is not True: raise SystemExit('strict-current gate missing')
          if g.get('active_match_pool_never_promoted_to_registered_roster') is not True: raise SystemExit('active pool separation missing')
          if g.get('machine_coach_bypass_closed') is not True: raise SystemExit('manager gate closure missing')
          if summary.get('effective_ledger_valid') is True:
              total=sum(int(states.get(k) or 0) for k in ('STRICT_CURRENT','ACTIVE_MATCH_POOL','PROVISIONAL_ONLY','NO_ROSTER_CONTEXT'))
              if summary.get('state_conservation') is not True or total<=0: raise SystemExit(str({'team_context_summary':summary}))
          print(json.dumps({'status':x['status'],'formal_current_version':x['formal_current_version'],'issue_counts':x['issue_counts'],'blockers':x['formal_upgrade_blockers'],'team_context_summary':summary},ensure_ascii=False))
          PY
# V5.0.1 remains active CURRENT. V6.9.4 consumes the four-state team-context ledger and keeps all research promotion gates fail-closed.