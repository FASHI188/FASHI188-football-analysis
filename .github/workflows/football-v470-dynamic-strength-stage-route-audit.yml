name: Football V4.7 Dynamic Strength Stage Route Audit

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/dynamic_strength_stage_route_audit_v470.py"
      - ".github/workflows/football-v470-dynamic-strength-stage-route-audit.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v470-dynamic-strength-stage-route-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: python -m py_compile football-data/validation/dynamic_strength_stage_route_audit_v470.py
      - name: Audit stage labels
        run: python football-data/validation/dynamic_strength_stage_route_audit_v470.py
      - name: Commit audit receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/dynamic_strength_stage_route_audit_v470_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist dynamic-strength special-stage route audit"
          git pull --rebase origin main
          git push origin HEAD:main
