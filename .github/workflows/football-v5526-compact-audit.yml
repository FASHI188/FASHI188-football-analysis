name: football-v5526-compact-audit

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v5526_compact_audit.py"
      - ".github/workflows/football-v5526-compact-audit.yml"

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run compact audit
        run: python football-data/validation/v5526_compact_audit.py
      - name: Persist compact receipt
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/ \
            --message-prefix "audit(football): persist compact V5.5.26 synchronized audit"
