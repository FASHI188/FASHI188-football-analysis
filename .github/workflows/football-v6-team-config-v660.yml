name: football-v6-team-config-v660
on:
  workflow_dispatch:
  schedule:
    - cron: "20 0 * * 1"
  push:
    paths:
      - "football-data/config/v6_team_configuration_weekly_v660.json"
      - "football-data/validation/v6_team_configuration_fetch_v660.py"
      - "football-data/validation/v6_team_roster_repair_v664.py"
      - ".github/workflows/football-v6-team-config-v660.yml"
permissions:
  contents: read
concurrency:
  group: football-v6-team-config-source-fetch
  cancel-in-progress: true
jobs:
  scan-and-repair:
    permissions:
      contents: write
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - name: Compile source acquisition chain
        run: |
          python -m py_compile football-data/validation/v6_team_configuration_fetch_v660.py
          python -m py_compile football-data/validation/v6_team_roster_repair_v664.py
      - name: Fetch latest team configurations
        run: python football-data/validation/v6_team_configuration_fetch_v660.py
      - name: Repair sub-18 roster snapshots without cross-source merging
        run: python football-data/validation/v6_team_roster_repair_v664.py
      - name: Persist source evidence only
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/evidence/team_configuration_weekly/ \
            --allow-prefix football-data/manifests/v6_team_configuration_fetch_v660_status.json \
            --allow-prefix football-data/manifests/v6_team_roster_repair_v664_status.json \
            --message-prefix "data(football): persist weekly team source evidence"
      - name: Enforce source acquisition semantics
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          f=Path('football-data/manifests/v6_team_configuration_fetch_v660_status.json')
          r=Path('football-data/manifests/v6_team_roster_repair_v664_status.json')
          if not f.exists() or not r.exists(): raise SystemExit('team source receipts missing')
          a=json.loads(f.read_text()); b=json.loads(r.read_text())
          ok=lambda s: str(s).startswith('PASS') or str(s).startswith('WARN')
          if not ok(a.get('status')) or b.get('status') not in {'PASS','WARN'}: raise SystemExit(str({'fetch':a.get('status'),'repair':b.get('status')}))
          g=b.get('governance') or {}
          if g.get('no_cross_source_player_list_merge') is not True or g.get('no_cross_endpoint_player_list_merge') is not True: raise SystemExit('roster repair merge governance missing')
          print(json.dumps({'fetch':a.get('status'),'repair':b.get('status'),'team_snapshots':a.get('snapshot_count') or a.get('team_snapshot_count'),'strict_repairs':b.get('strict_repairs_created')},ensure_ascii=False))
          PY
      - name: Dispatch authoritative derived team-context refresh
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run football-v6-team-context-overlay-validate-v668.yml --ref main
# This workflow is evidence-only; workflow_dispatch explicitly refreshes the single authoritative derived ledger after GITHUB_TOKEN persistence.