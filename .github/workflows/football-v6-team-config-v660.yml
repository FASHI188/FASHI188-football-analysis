name: football-v6-team-config-v660
on:
  workflow_dispatch:
  schedule:
    - cron: "20 0 * * 1"
  push:
    paths:
      - "football-data/config/v6_team_configuration_weekly_v660.json"
      - "football-data/config/v6_team_manager_enrichment_v663.json"
      - "football-data/validation/v6_team_configuration_fetch_v660.py"
      - "football-data/validation/v6_team_roster_repair_v664.py"
      - "football-data/validation/v6_team_provisional_roster_v667.py"
      - "football-data/validation/v6_team_configuration_weekly_v660.py"
      - ".github/workflows/football-v6-team-config-v660.yml"
permissions:
  contents: read
concurrency:
  group: football-v6-team-config-v660
  cancel-in-progress: true
jobs:
  scan-and-validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: |
          python -m py_compile football-data/validation/v6_team_configuration_fetch_v660.py
          python -m py_compile football-data/validation/v6_team_roster_repair_v664.py
          python -m py_compile football-data/validation/v6_team_provisional_roster_v667.py
          python -m py_compile football-data/validation/v6_team_configuration_weekly_v660.py
      - name: Fetch latest team configurations
        run: python football-data/validation/v6_team_configuration_fetch_v660.py
      - name: Repair sub-18 roster snapshots without cross-source merging
        run: python football-data/validation/v6_team_roster_repair_v664.py
      - name: Build separate prior-season provisional continuity evidence
        run: python football-data/validation/v6_team_provisional_roster_v667.py
      - name: Validate strict snapshots and verified manager overlays
        run: python football-data/validation/v6_team_configuration_weekly_v660.py
      - name: Persist weekly configuration and continuity evidence
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/evidence/team_configuration_weekly/ \
            --allow-prefix football-data/evidence/team_provisional_roster_weekly/ \
            --allow-prefix football-data/manifests/v6_team_configuration_fetch_v660_status.json \
            --allow-prefix football-data/manifests/v6_team_roster_repair_v664_status.json \
            --allow-prefix football-data/manifests/v6_team_provisional_roster_v667_status.json \
            --allow-prefix football-data/manifests/v6_team_configuration_weekly_v660_status.json \
            --message-prefix "audit(football): persist V6.6.7 weekly team context"
      - name: Enforce receipts
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          paths=[
            Path('football-data/manifests/v6_team_configuration_fetch_v660_status.json'),
            Path('football-data/manifests/v6_team_roster_repair_v664_status.json'),
            Path('football-data/manifests/v6_team_provisional_roster_v667_status.json'),
            Path('football-data/manifests/v6_team_configuration_weekly_v660_status.json')]
          if not all(p.exists() for p in paths): raise SystemExit('V6.6.7 receipts missing')
          a,y,z,x=[json.loads(p.read_text()) for p in paths]
          allowed=lambda value: str(value).startswith('PASS') or str(value).startswith('WARN')
          if not allowed(a.get('status')) or y.get('status') not in {'PASS','WARN'} or z.get('status')!='PASS' or not allowed(x.get('status')):
              raise SystemExit(str({'fetch':a.get('status'),'repair':y.get('status'),'provisional':z.get('status'),'audit':x.get('status')}))
          print(json.dumps({
            'fetch_status':a.get('status'),'latest_teams':x.get('latest_team_snapshots'),
            'sub18_before_repair':y.get('sub18_before_repair'),'strict_repairs_created':y.get('strict_repairs_created'),
            'strict_espn_retries':y.get('strict_espn_retries'),'provisional_continuity_count':z.get('provisional_continuity_count'),
            'audit_status':x.get('status'),'feature_eligibility':x.get('feature_eligibility'),
            'verified_manager_records':x.get('verified_manager_records')},ensure_ascii=False))
          PY
# Full refetch is weekly/manual/code-triggered. Manager/provisional evidence updates use the lightweight overlay validator.
