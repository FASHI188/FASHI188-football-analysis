name: football-v6-team-config-v660
on:
  workflow_dispatch:
  schedule:
    - cron: "20 0 * * 1"
  push:
    paths:
      - "football-data/config/v6_team_configuration_weekly_v660.json"
      - "football-data/config/v6_team_manager_enrichment_v663.json"
      - "football-data/config/v6_current_roster_overlay_v669.json"
      - "football-data/validation/v6_team_configuration_fetch_v660.py"
      - "football-data/validation/v6_team_roster_repair_v664.py"
      - "football-data/validation/v6_team_provisional_roster_v667.py"
      - "football-data/validation/v6_current_roster_overlay_v669.py"
      - "football-data/validation/v6_team_configuration_weekly_v660.py"
      - "football-data/validation/v6_team_context_effective_v6610.py"
      - ".github/workflows/football-v6-team-config-v660.yml"
permissions:
  contents: read
concurrency:
  group: football-v6-team-context-derived-writer
  cancel-in-progress: false
jobs:
  scan-and-validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - name: Compile complete team-context chain
        run: |
          python -m py_compile football-data/validation/v6_team_configuration_fetch_v660.py
          python -m py_compile football-data/validation/v6_team_roster_repair_v664.py
          python -m py_compile football-data/validation/v6_team_provisional_roster_v667.py
          python -m py_compile football-data/validation/v6_current_roster_overlay_v669.py
          python -m py_compile football-data/validation/v6_team_configuration_weekly_v660.py
          python -m py_compile football-data/validation/v6_team_context_effective_v6610.py
      - name: Fetch latest team configurations
        run: python football-data/validation/v6_team_configuration_fetch_v660.py
      - name: Repair sub-18 roster snapshots without cross-source merging
        run: python football-data/validation/v6_team_roster_repair_v664.py
      - name: Build separate prior-season provisional continuity evidence
        run: python football-data/validation/v6_team_provisional_roster_v667.py
      - name: Revalidate all strict current-roster overlays against this exact fresh baseline
        run: python football-data/validation/v6_current_roster_overlay_v669.py
      - name: Revalidate strict team and verified manager evidence against this exact fresh baseline
        run: python football-data/validation/v6_team_configuration_weekly_v660.py
      - name: Recompute mutually exclusive effective team-context coverage
        run: python football-data/validation/v6_team_context_effective_v6610.py
      - name: Persist weekly configuration and all derived receipts atomically by evidence epoch
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/evidence/team_configuration_weekly/ \
            --allow-prefix football-data/evidence/team_provisional_roster_weekly/ \
            --allow-prefix football-data/manifests/v6_team_configuration_fetch_v660_status.json \
            --allow-prefix football-data/manifests/v6_team_roster_repair_v664_status.json \
            --allow-prefix football-data/manifests/v6_team_provisional_roster_v667_status.json \
            --allow-prefix football-data/manifests/v6_current_roster_overlay_v669_status.json \
            --allow-prefix football-data/manifests/v6_team_configuration_weekly_v660_status.json \
            --allow-prefix football-data/manifests/v6_team_context_effective_v6610_status.json \
            --message-prefix "audit(football): persist V6.6.11 baseline-aligned team context"
      - name: Enforce same-baseline receipts
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          names=[
            'v6_team_configuration_fetch_v660_status.json',
            'v6_team_roster_repair_v664_status.json',
            'v6_team_provisional_roster_v667_status.json',
            'v6_current_roster_overlay_v669_status.json',
            'v6_team_configuration_weekly_v660_status.json',
            'v6_team_context_effective_v6610_status.json']
          paths=[Path('football-data/manifests')/n for n in names]
          if not all(p.exists() for p in paths): raise SystemExit('V6.6.11 receipts missing')
          a,r,p,c,t,e=[json.loads(x.read_text()) for x in paths]
          allowed=lambda value: str(value).startswith('PASS') or str(value).startswith('WARN')
          if not allowed(a.get('status')) or r.get('status') not in {'PASS','WARN'} or p.get('status')!='PASS' or c.get('status') not in {'PASS','WARN_INVALID_RECORDS'} or not allowed(t.get('status')) or e.get('status')!='PASS':
              raise SystemExit(str({'fetch':a.get('status'),'repair':r.get('status'),'provisional':p.get('status'),'current_overlay':c.get('status'),'team':t.get('status'),'effective':e.get('status')}))
          team_count=int(t.get('latest_team_snapshots') or 0)
          if int(c.get('team_baseline_count') or -1)!=team_count or int(e.get('team_count') or -1)!=team_count:
              raise SystemExit(str({'baseline_mismatch':True,'team':team_count,'current_overlay':c.get('team_baseline_count'),'effective':e.get('team_count')}))
          print(json.dumps({
            'team_count':team_count,
            'base_strict_roster':c.get('base_strict_current_roster_count'),
            'strict_overlay_additions':c.get('strict_roster_additions'),
            'effective_strict_roster':c.get('effective_strict_current_roster_count'),
            'provisional_continuity_raw':p.get('provisional_continuity_count'),
            'roster_context_states':e.get('roster_context_states'),
            'verified_manager_records':t.get('verified_manager_records'),
            'resolved_manager_records':t.get('resolved_manager_records'),
            'feature_eligibility':t.get('feature_eligibility')},ensure_ascii=False))
          PY
# Every fresh baseline must recompute every overlay-derived receipt before persistence; stale cross-epoch arithmetic is forbidden.
# Shared concurrency group serializes this baseline writer with overlay-derived writers so older checkouts cannot win the final state.