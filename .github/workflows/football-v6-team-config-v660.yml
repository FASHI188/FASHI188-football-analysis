name: football-v6-team-config-v660
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/config/v6_team_configuration_weekly_v660.json"
      - "football-data/validation/v6_team_configuration_weekly_v660.py"
      - "football-data/evidence/team_configuration_weekly/**"
permissions:
  contents: read
jobs:
  validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_team_configuration_weekly_v660.py
      - run: python football-data/validation/v6_team_configuration_weekly_v660.py
      - name: Persist weekly configuration audit
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_team_configuration_weekly_v660_status.json \
            --message-prefix "audit(football): persist V6.6.0 team configuration coverage"
      - name: Enforce receipt
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('football-data/manifests/v6_team_configuration_weekly_v660_status.json')
          if not p.exists(): raise SystemExit('V660 receipt missing')
          x=json.loads(p.read_text())
          if x.get('status') not in {'PASS','WARN'}: raise SystemExit(str(x))
          print(json.dumps({
            'status':x.get('status'),
            'teams':x.get('latest_team_snapshots'),
            'domains':x.get('domains_with_snapshots'),
            'complete':x.get('complete_team_snapshots'),
            'residual_eligible':x.get('residual_research_eligible_team_snapshots')
          },ensure_ascii=False))
          PY
# Scanner data is research context only. CURRENT/formal/runtime probabilities are not mutated.
