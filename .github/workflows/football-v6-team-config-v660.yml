name: football-v6-team-config-v660
on:
  workflow_dispatch:
  schedule:
    - cron: "20 0 * * 1"
  push:
    paths:
      - "football-data/config/v6_team_configuration_weekly_v660.json"
      - "football-data/config/v6_team_manager_enrichment_v663.json"
      - "football-data/validation/v6_team_configuration_fetch_v660.py"
      - "football-data/validation/v6_team_roster_repair_v664.py"
      - "football-data/validation/v6_team_configuration_weekly_v660.py"
      - "football-data/evidence/team_configuration_weekly/**"
      - "football-data/evidence/team_manager_context_weekly/**"
      - ".github/workflows/football-v6-team-config-v660.yml"
permissions:
  contents: read
concurrency:
  group: football-v6-team-config-v660
  cancel-in-progress: true
jobs:
  scan-and-validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: |
          python -m py_compile football-data/validation/v6_team_configuration_fetch_v660.py
          python -m py_compile football-data/validation/v6_team_roster_repair_v664.py
          python -m py_compile football-data/validation/v6_team_configuration_weekly_v660.py
      - name: Fetch latest team configurations
        run: python football-data/validation/v6_team_configuration_fetch_v660.py
      - name: Repair sub-18 roster snapshots without cross-source merging
        run: python football-data/validation/v6_team_roster_repair_v664.py
      - name: Validate snapshots and verified manager overlays
        run: python football-data/validation/v6_team_configuration_weekly_v660.py
      - name: Persist weekly configuration snapshot and audit
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/evidence/team_configuration_weekly/ \
            --allow-prefix football-data/manifests/v6_team_configuration_fetch_v660_status.json \
            --allow-prefix football-data/manifests/v6_team_roster_repair_v664_status.json \
            --allow-prefix football-data/manifests/v6_team_configuration_weekly_v660_status.json \
            --message-prefix "audit(football): persist V6.6.4 weekly team configurations"
      - name: Enforce receipt
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          f=Path('football-data/manifests/v6_team_configuration_fetch_v660_status.json')
          r=Path('football-data/manifests/v6_team_roster_repair_v664_status.json')
          p=Path('football-data/manifests/v6_team_configuration_weekly_v660_status.json')
          if not f.exists() or not r.exists() or not p.exists(): raise SystemExit('V6.6.4 receipts missing')
          a=json.loads(f.read_text()); y=json.loads(r.read_text()); x=json.loads(p.read_text())
          fetch_status=str(a.get('status') or '')
          repair_status=str(y.get('status') or '')
          audit_status=str(x.get('status') or '')
          allowed=lambda value: value.startswith('PASS') or value.startswith('WARN')
          if not allowed(fetch_status) or repair_status not in {'PASS','WARN'} or not allowed(audit_status):
              raise SystemExit(str({'fetch':fetch_status,'repair':repair_status,'audit':audit_status,'fetch_missing_domains':a.get('missing_domains'),'repair_attempts':y.get('attempts'),'audit_errors':x.get('validation_errors'),'manager_errors':x.get('manager_validation_errors')}))
          print(json.dumps({
            'fetch_status':fetch_status,
            'snapshots_written':a.get('snapshots_written'),
            'fetch_domains':a.get('domains_with_snapshots'),
            'aggregate_snapshot':a.get('aggregate_snapshot_path'),
            'repair_status':repair_status,
            'sub18_before_repair':y.get('sub18_before_repair'),
            'strict_repairs_created':y.get('strict_repairs_created'),
            'audit_status':audit_status,
            'latest_teams':x.get('latest_team_snapshots'),
            'verified_manager_records':x.get('verified_manager_records'),
            'audit_domains':x.get('domains_with_snapshots'),
            'feature_eligibility':x.get('feature_eligibility')
          },ensure_ascii=False))
          PY
# Weekly research context only. CURRENT V5.0.1/formal/runtime probabilities are never mutated.
