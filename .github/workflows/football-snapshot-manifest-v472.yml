name: Football V4.7.2 Repository Snapshot Manifest

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/football-snapshot-manifest-v472.yml"
      - "football-data/validation/repository_snapshot_manifest_v472.py"
      - "football-data/validation/persist_files_v474.py"

permissions:
  contents: read

concurrency:
  group: football-snapshot-manifest-v472-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-snapshot-manifest:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Repository integrity preflight
        run: python football-data/validation/repository_integrity_runtime_v473.py --strict-exit --print-summary

      - name: Compile manifest builder and persistence helper
        run: |
          python -m py_compile football-data/validation/repository_snapshot_manifest_v472.py
          python -m py_compile football-data/validation/persist_files_v474.py

      - name: Build deterministic repository snapshot manifest
        run: python football-data/validation/repository_snapshot_manifest_v472.py

      - name: Persist snapshot manifest safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_files_v474.py \
            football-data/manifests/repository_snapshot_v472.json \
            --message-prefix "audit(football): persist repository snapshot"

# V4.7.4 hardening: snapshot builder is validation-first and uses optimistic
# Contents API persistence. No direct git commit/pull/rebase/push occurs in CI.
