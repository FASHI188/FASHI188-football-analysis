name: football-v6-multimarket-v643
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_multimarket_draw_side_v643.py"
      - ".github/workflows/football-v6-multimarket-v643.yml"
permissions:
  contents: read
jobs:
  validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_multimarket_draw_side_v643.py
      - run: python football-data/validation/v6_multimarket_draw_side_v643.py
      - name: Persist
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_multimarket_draw_side_v643_status.json \
            --message-prefix "audit(football): persist V6.4.3 multi-market challenger"
      - name: Enforce
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('football-data/manifests/v6_multimarket_draw_side_v643_status.json')
          if not p.exists(): raise SystemExit('V643 receipt missing')
          x=json.loads(p.read_text())
          if x.get('status')!='PASS': raise SystemExit(x.get('status'))
          print(json.dumps({'counts':x.get('row_counts'),'gain':x.get('accuracy_gain_pp_vs_market'),'draw_gain':x.get('draw_recall_gain_pp'),'away_gain':x.get('away_precision_gain_pp'),'guard':x.get('proper_score_guard'),'gate':x.get('research_gate_passed')},ensure_ascii=False))
          PY
# Research only; no CURRENT/formal/runtime mutation.
