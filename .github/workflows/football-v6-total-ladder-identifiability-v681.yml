name: football-v6-total-ladder-identifiability-v681
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_total_ladder_identifiability_v681.py"
      - ".github/workflows/football-v6-total-ladder-identifiability-v681.yml"
      - "football-data/evidence/market_ladders_v680/kambi_full_time_ladders.json"
permissions:
  contents: read
jobs:
  audit:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_total_ladder_identifiability_v681.py
      - run: python football-data/validation/v6_total_ladder_identifiability_v681.py
      - name: Persist receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_total_ladder_identifiability_v681_status.json \
            --message-prefix "audit(football): persist V6.8.1 total ladder identifiability"
