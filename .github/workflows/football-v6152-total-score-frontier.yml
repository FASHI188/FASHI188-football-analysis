name: Football V6.15.2 Total Score Frontier
on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/validate_total_score_frontier_v6152.py"
      - ".github/workflows/football-v6152-total-score-frontier.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/validate_total_score_frontier_v6152.py
      - name: Run audit
        env: {PYTHONPATH: "football-data/engine:football-data/validation"}
        run: python football-data/validation/validate_total_score_frontier_v6152.py
      - name: Persist receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          p=football-data/manifests/v6_total_score_frontier_v6152_status.json
          if [ -f "$p" ]; then git add "$p"; fi
          if ! git diff --cached --quiet; then
            git commit -m "audit(football): persist V6.15.2 total-score frontier"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
