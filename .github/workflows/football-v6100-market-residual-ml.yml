name: Football V6.10.0 Market Residual ML

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/diagnose_1x2_market_residual_ml_v6100.py"
      - ".github/workflows/football-v6100-market-residual-ml.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install research dependency
        run: python -m pip install --disable-pip-version-check -q scikit-learn
      - name: Compile
        run: python -m py_compile football-data/validation/diagnose_1x2_market_residual_ml_v6100.py
      - name: Run market residual ML diagnostic
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        shell: bash
        run: |
          set +e
          python football-data/validation/diagnose_1x2_market_residual_ml_v6100.py
          code=$?
          echo "diagnostic_exit_code=$code" >> "$GITHUB_ENV"
          exit 0
      - name: Persist receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          path=football-data/manifests/v6_1x2_market_residual_ml_v6100_status.json
          if [ -f "$path" ]; then git add "$path"; fi
          if ! git diff --cached --quiet; then
            git commit -m "audit(football): persist market-residual ML 1X2 diagnostic"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Enforce pass
        run: test "${diagnostic_exit_code:-2}" = "0"
