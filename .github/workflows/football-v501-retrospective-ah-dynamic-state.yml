name: Football V5.0.1 Retrospective AH Dynamic-State Comparison

on:
  push:
    branches:
      - main
    paths:
      - "football-data/manifests/bayesian_dynamic_state_second_stage_v501_status.json"
      - "football-data/manifests/bayesian_dynamic_state_second_stage_v501/**"
      - "football-data/validation/retrospective_ah_dynamic_state_v501.py"
      - ".github/workflows/football-v501-retrospective-ah-dynamic-state.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: python -m py_compile football-data/validation/retrospective_ah_dynamic_state_v501.py
      - name: Run retrospective AH comparison
        id: validate
        shell: bash
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          set +e
          python football-data/validation/retrospective_ah_dynamic_state_v501.py
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit research receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/retrospective_ah_dynamic_state_v501_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "research(football): persist retrospective AH dynamic-state comparison"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Preserve validation failure after receipt persistence
        if: steps.validate.outputs.rc != '0'
        run: exit 1
