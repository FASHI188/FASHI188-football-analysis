name: Football V6.11.9 PIT Lineup Valuation

on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/validate_1x2_pit_lineup_valuation_v6119.py"
      - ".github/workflows/football-v6119-pit-lineup-valuation.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependency
        run: python -m pip install --disable-pip-version-check -q numpy scikit-learn
      - name: Compile
        run: python -m py_compile football-data/validation/validate_1x2_pit_lineup_valuation_v6119.py
      - name: Run PIT lineup valuation test
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        shell: bash
        run: |
          set +e
          log=/tmp/v6119.log
          python football-data/validation/validate_1x2_pit_lineup_valuation_v6119.py >"$log" 2>&1
          code=$?
          cat "$log"
          echo "validation_exit_code=$code" >> "$GITHUB_ENV"
          if [ "$code" != "0" ]; then
            python - "$code" "$log" <<'PY'
          import json, pathlib, sys
          code=int(sys.argv[1]); log=pathlib.Path(sys.argv[2]).read_text(encoding="utf-8",errors="replace")
          out=pathlib.Path("football-data/manifests/v6_1x2_pit_lineup_valuation_v6119_status.json")
          out.write_text(json.dumps({"schema_version":"V6.11.9-pit-lineup-valuation-1x2-r1","status":"FAILED_EXECUTION","formal_current_version":"V5.0.1","validation_exit_code":code,"error_log_tail":log[-12000:],"formal_probability_change":False,"formal_weight_change":False,"current_rule_change":False},ensure_ascii=False,indent=2)+"\n",encoding="utf-8")
          PY
          fi
          exit 0
      - name: Persist receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/v6_1x2_pit_lineup_valuation_v6119_status.json
          if ! git diff --cached --quiet; then
            git commit -m "audit(football): persist PIT lineup valuation 1X2 test"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Enforce pass
        run: test "${validation_exit_code:-2}" = "0"
