name: Football V4.7 Dynamic Strength Allocation-Only OOF

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/dynamic_strength_allocation_only_oof_v470.py"
      - "football-data/validation/aggregate_dynamic_strength_allocation_only_v470.py"
      - ".github/workflows/football-v470-dynamic-strength-allocation-only.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v470-dynamic-strength-allocation-only
  cancel-in-progress: true

jobs:
  screen-domain:
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        competition:
          - ENG_PremierLeague
          - GER_Bundesliga
          - ITA_SerieA
          - FRA_Ligue1
          - ESP_LaLiga
          - POR_PrimeiraLiga
          - NED_Eredivisie
          - SWE_Allsvenskan
          - NOR_Eliteserien
          - BRA_SerieA
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: |
          python -m py_compile football-data/validation/dynamic_strength_oof_screen_v470.py
          python -m py_compile football-data/validation/dynamic_strength_allocation_only_oof_v470.py
          python -m py_compile football-data/validation/aggregate_dynamic_strength_allocation_only_v470.py
      - name: Run isolated allocation-only screen
        id: worker
        shell: bash
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          set +e
          python football-data/validation/dynamic_strength_allocation_only_oof_v470.py --competition "${{ matrix.competition }}"
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit isolated evidence
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "football-data/manifests/dynamic_strength_allocation_only_oof_v470/${{ matrix.competition }}.json"
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "research(football): persist ${{ matrix.competition }} allocation-only dynamic-strength screen"
          for attempt in 1 2 3 4 5 6; do
            git pull --rebase origin main && git push origin HEAD:main && break
            if [ "$attempt" = "6" ]; then exit 1; fi
            sleep $((attempt * 3))
          done
      - name: Preserve worker failure state
        if: steps.worker.outputs.rc != '0'
        run: exit 1

  aggregate:
    if: always()
    needs: screen-domain
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: git pull --rebase origin main
      - name: Aggregate
        id: aggregate
        shell: bash
        run: |
          set +e
          python football-data/validation/aggregate_dynamic_strength_allocation_only_v470.py
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit aggregate
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/dynamic_strength_allocation_only_oof_v470_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "research(football): aggregate allocation-only dynamic-strength screening"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Enforce complete aggregate
        if: steps.aggregate.outputs.rc != '0'
        run: exit 1
