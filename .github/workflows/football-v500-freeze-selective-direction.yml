name: Football V5 Freeze Selective Direction Threshold

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/freeze_selective_direction_threshold_v500.py"
      - "football-data/validation/one_x_two_70pct_forward_threshold_oof_v470.py"
      - "football-data/manifests/one_x_two_70pct_forward_threshold_oof_v470_status.json"
      - ".github/workflows/football-v500-freeze-selective-direction.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v500-freeze-selective-direction
  cancel-in-progress: true

jobs:
  freeze:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: python -m py_compile football-data/validation/freeze_selective_direction_threshold_v500.py
      - name: Freeze threshold
        id: freeze
        shell: bash
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          set +e
          python football-data/validation/freeze_selective_direction_threshold_v500.py
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit selection receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/promotions/ESP_LaLiga_selective_direction_v500_selection.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "research(football): persist V5 LaLiga selective threshold selection"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Preserve failure after receipt persistence
        if: steps.freeze.outputs.rc != '0'
        run: exit 1
