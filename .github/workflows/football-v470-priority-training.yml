name: Football V4.7 Priority Challenger Training

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/train_priority_challengers_v470.py"
      - "football-data/validation/train_one_priority_challenger_v470.py"
      - "football-data/validation/persist_files_v474.py"
      - "football-data/engine/conditional_allocation_challenger_v470.py"
      - "football-data/engine/total_tail_challenger_v470.py"
      - ".github/workflows/football-v470-priority-training.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: football-v470-priority-training-${{ github.ref }}
  cancel-in-progress: true

jobs:
  train:
    strategy:
      fail-fast: false
      matrix:
        competition:
          - KOR_KLeague1
          - NOR_Eliteserien
          - SWE_Allsvenskan
          - USA_MLS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile training assets
        run: |
          python -m py_compile football-data/engine/conditional_allocation_challenger_v470.py
          python -m py_compile football-data/engine/total_tail_challenger_v470.py
          python -m py_compile football-data/validation/train_priority_challengers_v470.py
          python -m py_compile football-data/validation/train_one_priority_challenger_v470.py

      - name: Train ${{ matrix.competition }}
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/train_one_priority_challenger_v470.py "${{ matrix.competition }}"

      - name: Upload competition receipt even on failure
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: receipt-${{ matrix.competition }}
          path: football-data/manifests/priority_challenger_training_v470_${{ matrix.competition }}.json
          if-no-files-found: warn
          retention-days: 7

  aggregate:
    needs: train
    if: always()
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile shared persistence helper
        run: python -m py_compile football-data/validation/persist_files_v474.py

      - name: Download competition receipts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: receipt-*
          path: training-receipts
          merge-multiple: true

      - name: Aggregate receipts
        shell: bash
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path("football-data")
          receipt_dir = Path("training-receipts")
          receipts = []
          if receipt_dir.exists():
              for path in sorted(receipt_dir.glob("priority_challenger_training_v470_*.json")):
                  receipts.append(json.loads(path.read_text(encoding="utf-8")))

          reports = {}
          failures = {}
          for receipt in receipts:
              cid = receipt["competition_id"]
              if receipt.get("status") == "PASS" and isinstance(receipt.get("artifact"), dict):
                  artifact = receipt["artifact"]
                  reports[cid] = artifact
                  target = root / "models" / "challengers_v470" / cid
                  target.mkdir(parents=True, exist_ok=True)
                  (target / "priority_v470.json").write_text(
                      json.dumps(artifact, ensure_ascii=False, indent=2) + "\n",
                      encoding="utf-8",
                  )
              else:
                  failures[cid] = receipt.get("error", "training receipt failed")
                  reports[cid] = {"competition_id": cid, "status": "失败", "reason": failures[cid]}

          expected = ["KOR_KLeague1", "NOR_Eliteserien", "SWE_Allsvenskan", "USA_MLS"]
          for cid in expected:
              if cid not in reports:
                  failures[cid] = "missing training receipt"
                  reports[cid] = {"competition_id": cid, "status": "失败", "reason": "missing training receipt"}

          pass_count = sum(1 for cid in expected if cid not in failures)
          status = "PASS" if pass_count == len(expected) else "FAIL" if pass_count == 0 else "PARTIAL"
          manifest = {
              "schema_version": "V4.7.0-priority-challenger-training-r4",
              "generated_at_utc": datetime.now(timezone.utc).isoformat(),
              "status": status,
              "priority_competitions": expected,
              "pass_count": pass_count,
              "failure_count": len(failures),
              "formal_weight_change": False,
              "automatic_promotion": False,
              "method": "four competition-independent parallel nested chronological OOF jobs; no cross-competition training rows, calibrators or weights",
              "reports": reports,
              "failures": failures,
          }
          out = root / "manifests" / "priority_challenger_training_v470_status.json"
          out.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(json.dumps({"status": status, "pass_count": pass_count, "failures": failures}, ensure_ascii=False, indent=2))
          PY

      - name: Persist aggregate diagnostic receipt even when training fails
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_files_v474.py \
            football-data/manifests/priority_challenger_training_v470_status.json \
            --message-prefix "training(football): persist priority-training aggregate receipt"

      - name: Enforce aggregate training truthfulness
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("football-data/manifests/priority_challenger_training_v470_status.json").read_text(encoding="utf-8"))
          if report.get("status") != "PASS":
              raise SystemExit(f"priority challenger training not PASS: {report.get('failures')}")
          print("priority challenger training PASS")
          PY

      - name: Persist all four successful competition artifacts safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_files_v474.py \
            football-data/models/challengers_v470/KOR_KLeague1/priority_v470.json \
            football-data/models/challengers_v470/NOR_Eliteserien/priority_v470.json \
            football-data/models/challengers_v470/SWE_Allsvenskan/priority_v470.json \
            football-data/models/challengers_v470/USA_MLS/priority_v470.json \
            --message-prefix "training(football): persist validated priority challenger artifact"

# V4.7.4 hardening: per-competition failures are truthful nonzero jobs; aggregate
# failure receipts remain inspectable; only a PASS aggregate can persist model artifacts.
