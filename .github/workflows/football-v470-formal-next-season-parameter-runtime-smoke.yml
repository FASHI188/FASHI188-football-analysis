name: Football V4.7 Formal Next Season Parameter Runtime Smoke

on:
  push:
    branches:
      - main
    paths:
      - "football-data/engine/formal_next_season_parameter_runtime_v470.py"
      - "football-data/manifests/formal_next_season_parameter_rollforward_v470_status.json"
      - "football-data/validation/smoke_formal_next_season_parameter_runtime_v470.py"
      - ".github/workflows/football-v470-formal-next-season-parameter-runtime-smoke.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: |
          python -m py_compile football-data/engine/formal_next_season_parameter_runtime_v470.py
          python -m py_compile football-data/validation/smoke_formal_next_season_parameter_runtime_v470.py
      - name: Run smoke
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/smoke_formal_next_season_parameter_runtime_v470.py
      - name: Commit receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/formal_next_season_parameter_runtime_v470_smoke.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist next-season parameter runtime smoke"
          git pull --rebase origin main
          git push origin HEAD:main
