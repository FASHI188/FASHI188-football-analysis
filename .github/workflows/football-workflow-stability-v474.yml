name: Football V4.7.4 Workflow Stability

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "football-data/validation/workflow_stability_audit_v474.py"
      - "football-data/validation/persist_files_v474.py"

permissions:
  contents: read

concurrency:
  group: football-workflow-stability-v474-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-workflows:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile stability tooling
        run: |
          python -m py_compile football-data/validation/workflow_stability_audit_v474.py
          python -m py_compile football-data/validation/persist_files_v474.py

      - name: Scan all workflows
        run: python football-data/validation/workflow_stability_audit_v474.py --write-receipt --print-summary

      - name: Persist diagnostic receipt safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_files_v474.py \
            football-data/manifests/workflow_stability_v474_status.json \
            --message-prefix "audit(football): persist"

# Diagnostic-only baseline. It intentionally does not fail on findings while the
# legacy workflows are being migrated. Once the baseline is clean, the audit will
# be promoted to a fail-closed workflow hygiene gate.
