name: Football V5.5.31 Workflow Stability

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "football-data/validation/workflow_stability_audit_v474.py"
      - "football-data/validation/persist_files_v474.py"
      - "football-data/validation/persist_generated_worktree_v474.py"

permissions:
  contents: read

concurrency:
  group: football-workflow-stability-v5531-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-workflows:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history for frozen baseline verification
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile stability tooling
        run: |
          python -m py_compile football-data/validation/workflow_stability_audit_v474.py
          python -m py_compile football-data/validation/persist_files_v474.py
          python -m py_compile football-data/validation/persist_generated_worktree_v474.py

      - name: Enforce fail-closed gate and write local receipt
        run: |
          python football-data/validation/workflow_stability_audit_v474.py \
            --write-receipt \
            --strict-exit \
            --print-summary

      - name: Persist passing stability receipt safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_files_v474.py \
            football-data/manifests/workflow_stability_v474_status.json \
            --message-prefix "audit(football): persist V5.5.31 workflow-stability receipt"

# The exact V5.5.30 legacy finding set is frozen by Git blob SHA inside the
# scanner. Existing findings are quarantined, remain fully visible, and may only
# decrease. Any new unsafe finding or baseline-integrity failure exits non-zero.
