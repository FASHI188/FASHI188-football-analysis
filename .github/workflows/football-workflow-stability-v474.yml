name: Football V4.7.4 Workflow Stability

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "football-data/validation/workflow_stability_audit_v474.py"
      - "football-data/validation/persist_files_v474.py"
      - "football-data/validation/persist_generated_worktree_v474.py"

permissions:
  contents: read

concurrency:
  group: football-workflow-stability-v474-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-workflows:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile stability tooling
        run: |
          python -m py_compile football-data/validation/workflow_stability_audit_v474.py
          python -m py_compile football-data/validation/persist_files_v474.py
          python -m py_compile football-data/validation/persist_generated_worktree_v474.py

      - name: Scan all workflows and write local receipt
        run: python football-data/validation/workflow_stability_audit_v474.py --write-receipt --print-summary

      - name: Persist stability receipt safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_files_v474.py \
            football-data/manifests/workflow_stability_v474_status.json \
            --message-prefix "audit(football): persist workflow-stability receipt"

      - name: Enforce fail-closed workflow hygiene gate
        run: python football-data/validation/workflow_stability_audit_v474.py --strict-exit --print-summary

# V4.7.4 baseline is now clean. This gate remains fail-closed so direct git
# writeback, global write permission, deprecated action runtimes, missing timeouts,
# or direct per-workflow Contents API implementations cannot silently return.
# Public-runner verification trigger: 2026-07-20.
