name: Football V4.7 Dynamic Strength Promotion Readiness

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/dynamic_strength_promotion_readiness_v470.py"
      - "football-data/manifests/dynamic_strength_live_activation_readiness_v470_status.json"
      - "football-data/manifests/dynamic_strength_pre_oof_runtime_v470_smoke.json"
      - "football-data/processed/ESP_LaLiga/**"
      - "football-data/processed/NED_Eredivisie/**"
      - "football-data/engine/dynamic_strength_pre_oof_runtime_v470.py"
      - "football-data/engine/run_formal_prediction_actionable.py"
      - ".github/workflows/football-v470-dynamic-strength-promotion-readiness.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile football-data/validation/dynamic_strength_promotion_readiness_v470.py
      - name: Audit readiness
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/dynamic_strength_promotion_readiness_v470.py
      - name: Commit receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/dynamic_strength_promotion_readiness_v470_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist dynamic-strength promotion readiness"
          git pull --rebase origin main
          git push origin HEAD:main
