name: football-v6-market-consensus-refresh-v683
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_market_consensus_refresh_v683.py"
      - ".github/workflows/football-v6-market-consensus-refresh-v683.yml"
      - "football-data/evidence/market_consensus_prospective/**"
permissions:
  contents: read
jobs:
  audit:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_market_consensus_refresh_v683.py
      - run: python football-data/validation/v6_market_consensus_refresh_v683.py
      - name: Persist refreshed consensus audits
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_market_consensus_refresh_v683_status.json \
            --allow-prefix football-data/manifests/prospective_market_consensus_v554_status.json \
            --message-prefix "audit(football): persist V6.8.3 consensus refresh"
      - name: Enforce
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('football-data/manifests/v6_market_consensus_refresh_v683_status.json')
          if not p.exists(): raise SystemExit('V683 receipt missing')
          x=json.loads(p.read_text())
          if x.get('status') not in {'PASS_CONSENSUS_AVAILABLE','NO_CONSENSUS_YET'}: raise SystemExit(str(x))
          print(json.dumps(x,ensure_ascii=False))
          PY
