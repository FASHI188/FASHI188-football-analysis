name: football-v6-direct-outcome-mvp-v600

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_direct_outcome_mvp_v600.py"
      - ".github/workflows/football-v6-direct-outcome-mvp-v600.yml"

permissions:
  contents: read

concurrency:
  group: football-v6-direct-outcome-mvp-v600
  cancel-in-progress: true

jobs:
  experiment:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile V6 MVP
        run: python -m py_compile football-data/validation/v6_direct_outcome_mvp_v600.py
      - name: Run direct-outcome MVP challenge
        run: python football-data/validation/v6_direct_outcome_mvp_v600.py
      - name: Persist V6 MVP receipt safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/v6_direct_outcome_mvp_v600_status.json \
            --message-prefix "audit(football): persist V6 direct-outcome MVP"

# One-time research challenge. No schedule and no formal/runtime mutation.
