name: Football V6.14.6 Score Market State Rep100

on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/validate_score_market_state_rep100_v6146.py"
      - ".github/workflows/football-v6146-score-market-state-rep100.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run score-state replication100
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        shell: bash
        run: |
          set +e
          log=/tmp/v6146.log
          python football-data/validation/validate_score_market_state_rep100_v6146.py >"$log" 2>&1
          code=$?
          cat "$log"
          echo "validation_exit_code=$code" >> "$GITHUB_ENV"
          if [ "$code" != "0" ]; then
            python - "$code" "$log" <<'PY'
          import json, pathlib, sys
          code=int(sys.argv[1]); log=pathlib.Path(sys.argv[2]).read_text(encoding="utf-8",errors="replace")
          out=pathlib.Path("football-data/manifests/v6_score_market_state_rep100_v6146_status.json")
          out.write_text(json.dumps({"schema_version":"V6.14.6-score-market-state-rep100-r1","status":"FAILED_EXECUTION","validation_exit_code":code,"error_log_tail":log[-12000:],"formal_probability_change":False,"formal_weight_change":False,"current_rule_change":False},ensure_ascii=False,indent=2)+"\n",encoding="utf-8")
          PY
          fi
          exit 0
      - name: Persist receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          path=football-data/manifests/v6_score_market_state_rep100_v6146_status.json
          if [ -f "$path" ]; then git add "$path"; fi
          if ! git diff --cached --quiet; then
            git commit -m "audit(football): persist score-state replication100"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Enforce execution
        run: test "${validation_exit_code:-2}" = "0"
