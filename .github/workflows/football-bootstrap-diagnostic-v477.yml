name: Football V4.7.7 Bootstrap Diagnostic

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/football-bootstrap-diagnostic-v477.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: football-bootstrap-diagnostic-v477
  cancel-in-progress: true

jobs:
  diagnose:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run repository integrity without strict exit
        run: python3 football-data/validation/repository_integrity_runtime_v473.py --write-receipt --print-summary

      - name: Run workflow stability without strict exit
        run: python3 football-data/validation/workflow_stability_audit_v474.py --write-receipt --print-summary

      - name: Persist diagnostic receipts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python3 football-data/validation/persist_files_v474.py \
            football-data/manifests/repository_integrity_v471_status.json \
            football-data/manifests/workflow_stability_v474_status.json \
            --message-prefix "diag(football): persist bootstrap diagnostic receipt"

