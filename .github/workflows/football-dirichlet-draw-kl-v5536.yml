name: football-dirichlet-draw-kl-v5536

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  experiment:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile experiment
        run: python -m py_compile football-data/validation/dirichlet_draw_kl_v5536.py
      - name: Run last-complete-season Dirichlet calibration experiment
        run: python football-data/validation/dirichlet_draw_kl_v5536.py
      - name: Persist V5.5.36 receipt safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/manifests/dirichlet_draw_kl_v5536_status.json \
            --message-prefix "audit(football): persist V5.5.36 Dirichlet draw KL"

# Failed challenge experiment. Manual dispatch only; no formal/runtime mutation.
