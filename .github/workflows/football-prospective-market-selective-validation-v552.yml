name: football-prospective-market-selective-validation-v552

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/config/prospective_market_selective_challenger_v526.json"
      - "football-data/evidence/market_selective_prospective_outcomes/**"
      - "football-data/validation/prospective_market_selective_outcome_v552.py"
      - "football-data/validation/prospective_market_selective_aggregate_v552.py"
      - ".github/workflows/football-prospective-market-selective-validation-v552.yml"

permissions:
  contents: write

concurrency:
  group: football-prospective-market-selective-validation-v552
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check selective scorer and aggregate
        run: |
          python -m py_compile \
            football-data/validation/prospective_market_selective_outcome_v552.py \
            football-data/validation/prospective_market_selective_aggregate_v552.py
      - name: Aggregate prospective selective evidence
        run: python football-data/validation/prospective_market_selective_aggregate_v552.py
      - name: Commit readiness receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- football-data/manifests/prospective_market_selective_validation_v552_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist prospective selective market readiness"
          git pull --rebase origin main
          git push
