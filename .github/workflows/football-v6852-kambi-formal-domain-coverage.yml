name: Football V6.8.5.2 Kambi Formal Domain Coverage

on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/v6_kambi_formal_domain_coverage_v6852.py"
      - ".github/workflows/football-v6852-kambi-formal-domain-coverage.yml"
      - "football-data/evidence/market_ladders_v680/kambi_full_time_ladders.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit formal-domain Kambi coverage
        run: python football-data/validation/v6_kambi_formal_domain_coverage_v6852.py
      - name: Persist receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/v6_kambi_formal_domain_coverage_v6852_status.json
          if ! git diff --cached --quiet; then
            git commit -m "audit(football): persist Kambi formal-domain coverage"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
