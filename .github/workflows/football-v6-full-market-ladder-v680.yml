name: football-v6-full-market-ladder-v680
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/v6_full_market_ladder_extract_v680.py"
      - ".github/workflows/football-v6-full-market-ladder-v680.yml"
      - "football-data/evidence/direct_provider_probes/kambi/**/*.json"
permissions:
  contents: read
jobs:
  extract:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - run: python -m py_compile football-data/validation/v6_full_market_ladder_extract_v680.py
      - run: python football-data/validation/v6_full_market_ladder_extract_v680.py
      - name: Persist derived ladders and receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/evidence/market_ladders_v680/ \
            --allow-prefix football-data/manifests/v6_full_market_ladder_v680_status.json \
            --message-prefix "audit(football): persist V6.8.0 full market ladders"
      - name: Enforce receipt
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('football-data/manifests/v6_full_market_ladder_v680_status.json')
          if not p.exists(): raise SystemExit('V6.8.0 ladder receipt missing')
          x=json.loads(p.read_text())
          if x.get('status')!='PASS': raise SystemExit(str(x))
          print(json.dumps(x,ensure_ascii=False))
          PY
