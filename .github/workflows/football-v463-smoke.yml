name: Football V4.6.3 Evidence Smoke

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: football-v463-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-eng-premier-league:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Repository integrity preflight
        run: python football-data/validation/repository_integrity_v471.py --strict-exit --print-summary

      - name: Apply staged core migration and correct fold semantics
        run: |
          python football-data/tools/apply_v462_grade_345_fixes.py
          python football-data/tools/apply_v462_grade_345_fixes_r2.py
          python football-data/tools/apply_v462_grade_345_fixes_r3.py
          python football-data/tools/apply_v463_correct_fold_semantics.py

      - name: Compile and unit test corrected chain
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          python -m py_compile \
            football-data/engine/market_kl_projection_v463.py \
            football-data/validation/rolling_outer_validation_v463.py \
            football-data/validation/final_chain_replay_v463.py \
            football-data/validation/a_grade_diagnostics_v463.py \
            football-data/validation/market_baseline_v463.py \
            football-data/validation/lomo_value_validation_v463.py \
            football-data/validation/a_grade_auditor_v463.py
          python -m unittest football-data/tests/test_v462_bottom_invariants.py -v
          python -m unittest football-data/tests/test_market_kl_projection_v463.py -v

      - name: Rebuild ENG formal core and OOF
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          python football-data/validation/nested_backtest_v460.py --competition ENG_PremierLeague --print-summary
          python football-data/validation/oof_matrix_calibration_v461.py --competition ENG_PremierLeague --print-summary

      - name: Validate corrected ENG rolling and replay evidence
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          python football-data/validation/rolling_outer_validation_v463.py --competition ENG_PremierLeague --print-summary
          python football-data/validation/competition_replay_receipts_v462.py --competition ENG_PremierLeague --print-summary
          python football-data/validation/final_chain_replay_v463.py --competition ENG_PremierLeague --print-summary

      - name: Generate ENG lineup diagnostics market and LOMO gates
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          python - <<'PY'
          from probable_lineup_route_v462 import validate_competition
          print(validate_competition("ENG_PremierLeague", write=True))
          PY
          python football-data/validation/a_grade_diagnostics_v463.py --competition ENG_PremierLeague --print-summary
          python football-data/validation/market_baseline_v463.py --competition ENG_PremierLeague --print-summary
          python football-data/validation/lomo_value_validation_v463.py --competition ENG_PremierLeague --print-summary

      - name: Run corrected fail-closed ENG A audit
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          python - <<'PY'
          from a_grade_auditor_v463 import audit_competition
          result = audit_competition("ENG_PremierLeague", write=True)
          print(result)
          assert result["a_grade_receipt_issued"] is False
          PY
