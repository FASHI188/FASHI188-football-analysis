name: Football Public Lineup Backfill

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/football-public-lineup-backfill.yml"
      - "football-data/ingestion/public_lineup_backfill_v463.py"
      - "football-data/validation/persist_generated_worktree_v474.py"
      - "football-data/config/multisource_evidence_v463.json"

permissions:
  contents: read

concurrency:
  group: football-public-lineup-backfill-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backfill-lineups:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Repository integrity preflight
        run: python football-data/validation/repository_integrity_runtime_v473.py --strict-exit --print-summary

      - name: Compile collectors validator and persistence helper
        run: |
          python -m py_compile football-data/ingestion/public_lineup_backfill_v463.py
          python -m py_compile football-data/validation/multisource_evidence_validator_v463.py
          python -m py_compile football-data/validation/persist_generated_worktree_v474.py

      - name: Backfill Transfermarkt-datasets and StatsBomb Open lineups
        run: python football-data/ingestion/public_lineup_backfill_v463.py --source all

      - name: Validate independent-source consistency
        run: python football-data/validation/multisource_evidence_validator_v463.py --print-summary

      - name: Persist normalized public evidence safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --branch main \
            --allow-prefix football-data/evidence/lineups/ \
            --allow-prefix football-data/manifests/ \
            --allow-prefix football-data/validation/reports/ \
            --message-prefix "data(football): persist validated public-lineup artifact"

# V4.7.4 hardening: collector and validator must pass before persistence. No
# direct git commit/pull/rebase/push occurs inside this workflow.
