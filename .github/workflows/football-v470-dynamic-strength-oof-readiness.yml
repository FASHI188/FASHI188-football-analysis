name: Football V4.7 Dynamic Strength OOF Readiness

on:
  push:
    branches:
      - main
    paths:
      - "football-data/manifests/dynamic_strength_public_evidence_v470_status.json"
      - "football-data/validation/dynamic_strength_oof_readiness_gate_v470.py"
      - ".github/workflows/football-v470-dynamic-strength-oof-readiness.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v470-dynamic-strength-oof-readiness
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile football-data/validation/dynamic_strength_oof_readiness_gate_v470.py
      - run: python football-data/validation/dynamic_strength_oof_readiness_gate_v470.py
      - name: Commit gate receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/dynamic_strength_oof_readiness_v470_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist strict dynamic-strength OOF readiness"
          git pull --rebase origin main
          git push origin HEAD:main
