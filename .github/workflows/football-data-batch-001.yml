name: Football Data Batch 001

on:
  workflow_dispatch:
    inputs:
      strict_extra:
        description: "Fail when Sweden/Switzerland current snapshots are unavailable"
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - "football-data/config/league_sources_batch_001.json"
      - "football-data/engine/ingest_batch_001.py"
      - "football-data/engine/ingest_batch_001_alias_adapter.py"
      - "football-data/engine/ingest_batch_001_safe_adapter.py"
      - "football-data/validation/persist_generated_worktree_v474.py"
      - "football-data/tests/test_ingest_batch_001.py"
      - "football-data/tests/test_ingest_batch_001_safe_merge.py"
      - "football-data/manifests/bootstrap_request.json"
      - ".github/workflows/football-data-batch-001.yml"
  pull_request:
    branches: [main]
    paths:
      - "football-data/config/league_sources_batch_001.json"
      - "football-data/engine/ingest_batch_001.py"
      - "football-data/engine/ingest_batch_001_alias_adapter.py"
      - "football-data/engine/ingest_batch_001_safe_adapter.py"
      - "football-data/validation/persist_generated_worktree_v474.py"
      - "football-data/tests/test_ingest_batch_001.py"
      - "football-data/tests/test_ingest_batch_001_safe_merge.py"
      - "football-data/manifests/bootstrap_request.json"
      - ".github/workflows/football-data-batch-001.yml"
  schedule:
    - cron: "17 3 * * 1,4"

permissions:
  contents: read

concurrency:
  group: football-data-batch-001-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ingest:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Repository integrity preflight
        run: python football-data/validation/repository_integrity_runtime_v473.py --strict-exit --print-summary

      - name: Compile non-destructive batch adapter and persistence helper
        run: |
          python -m py_compile football-data/engine/ingest_batch_001_safe_adapter.py
          python -m py_compile football-data/validation/persist_generated_worktree_v474.py

      - name: Run integrity tests
        run: python -m unittest discover -s football-data/tests -p "test_*.py" -v

      - name: Ingest and build league profiles without replacing other competition roots
        id: ingest
        shell: bash
        run: |
          mkdir -p football-data/manifests
          args=(--print-summary)
          if [[ "${{ github.event.inputs.strict_extra || 'false' }}" == "true" ]]; then
            args+=(--strict-extra)
          fi
          set +e
          python football-data/engine/ingest_batch_001_safe_adapter.py "${args[@]}" 2>&1 | tee football-data/manifests/bootstrap_run.txt
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Verify generated profiles and preserve all registered competition domains
        if: steps.ingest.outputs.status == '0'
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path("football-data")
          manifest = json.loads((root / "manifests/latest_ingestion.json").read_text(encoding="utf-8"))
          registry = json.loads((root / "config/platform_registry.json").read_text(encoding="utf-8"))
          if manifest["summary"]["processed_leagues"] < 8:
              raise SystemExit("fewer than eight required batch-001 league profiles were generated")
          missing = []
          for item in registry["competitions"]:
              cid = item["competition_id"]
              profile_path = root / "league_profiles" / cid / "profile.json"
              if not profile_path.is_file():
                  missing.append(cid)
          if missing:
              raise SystemExit(f"batch-001 publication would leave registered competition profiles missing: {missing}")
          for profile_path in sorted((root / "league_profiles").glob("*/profile.json")):
              profile = json.loads(profile_path.read_text(encoding="utf-8"))
              if abs(sum(profile["result_distribution"].values()) - 1.0) > 1e-6:
                  raise SystemExit(f"result probabilities do not sum to one: {profile_path}")
              if abs(sum(profile["total_goals_0_7plus"].values()) - 1.0) > 1e-6:
                  raise SystemExit(f"total-goal probabilities do not sum to one: {profile_path}")
          PY

      - name: Persist validated snapshots safely
        if: ${{ github.event_name != 'pull_request' && steps.ingest.outputs.status == '0' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --branch main \
            --allow-prefix football-data/raw/ \
            --allow-prefix football-data/processed/ \
            --allow-prefix football-data/league_profiles/ \
            --allow-prefix football-data/manifests/ \
            --message-prefix "data(football): persist validated batch-001 artifact"

      - name: Enforce ingestion result
        if: steps.ingest.outputs.status != '0'
        shell: bash
        run: exit 1

# V4.7.4 hardening: no direct git commit/pull/rebase/push. Failed ingestion cannot
# be persisted; PRs validate without mutating branches; stale runs are cancelled.
