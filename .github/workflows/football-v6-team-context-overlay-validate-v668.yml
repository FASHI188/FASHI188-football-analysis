name: football-v6-team-context-overlay-validate-v668
on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/evidence/team_configuration_weekly/**"
      - "football-data/evidence/team_manager_context_weekly/**"
      - "football-data/evidence/team_current_roster_weekly/**"
      - "football-data/evidence/team_active_match_pool_weekly/**"
      - "football-data/validation/v6_team_provisional_roster_v667.py"
      - "football-data/validation/v6_current_roster_overlay_v669.py"
      - "football-data/validation/v6_team_configuration_weekly_v660.py"
      - "football-data/validation/v6_team_context_effective_v6610.py"
      - "football-data/validation/v6_roster_gap_inventory_v6611.py"
      - "football-data/config/v6_team_manager_enrichment_v663.json"
      - "football-data/config/v6_current_roster_overlay_v669.json"
      - ".github/workflows/football-v6-team-context-overlay-validate-v668.yml"
permissions:
  contents: read
concurrency:
  group: football-v6-team-context-derived-writer
  cancel-in-progress: true
jobs:
  validate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - name: Compile authoritative derived-context chain
        run: |
          python -m py_compile football-data/validation/v6_team_provisional_roster_v667.py
          python -m py_compile football-data/validation/v6_current_roster_overlay_v669.py
          python -m py_compile football-data/validation/v6_team_configuration_weekly_v660.py
          python -m py_compile football-data/validation/v6_team_context_effective_v6610.py
          python -m py_compile football-data/validation/v6_roster_gap_inventory_v6611.py
      - name: Build provisional continuity evidence
        run: python football-data/validation/v6_team_provisional_roster_v667.py
      - name: Validate strict current-roster overlays
        run: python football-data/validation/v6_current_roster_overlay_v669.py
      - name: Validate strict team and manager evidence
        run: python football-data/validation/v6_team_configuration_weekly_v660.py
      - name: Consolidate four mutually exclusive effective coverage states
        run: python football-data/validation/v6_team_context_effective_v6610.py
      - name: Build context-aware unresolved strict current-roster queue
        run: python football-data/validation/v6_roster_gap_inventory_v6611.py
      - name: Reject stale relevant-input checkout before persistence
        id: freshness
        shell: bash
        run: |
          git fetch origin main --quiet
          if git diff --quiet HEAD..origin/main -- \
              football-data/evidence/team_configuration_weekly \
              football-data/evidence/team_manager_context_weekly \
              football-data/evidence/team_current_roster_weekly \
              football-data/evidence/team_active_match_pool_weekly \
              football-data/validation/v6_team_provisional_roster_v667.py \
              football-data/validation/v6_current_roster_overlay_v669.py \
              football-data/validation/v6_team_configuration_weekly_v660.py \
              football-data/validation/v6_team_context_effective_v6610.py \
              football-data/validation/v6_roster_gap_inventory_v6611.py \
              football-data/config/v6_team_manager_enrichment_v663.json \
              football-data/config/v6_current_roster_overlay_v669.json; then
            echo "fresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "fresh=false" >> "$GITHUB_OUTPUT"
            echo "Relevant team-context inputs advanced on main; this checkout is audit-only and will not persist derived receipts."
          fi
      - name: Persist authoritative derived team-context receipts
        if: always() && steps.freshness.outputs.fresh == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/evidence/team_provisional_roster_weekly/ \
            --allow-prefix football-data/manifests/v6_team_provisional_roster_v667_status.json \
            --allow-prefix football-data/manifests/v6_current_roster_overlay_v669_status.json \
            --allow-prefix football-data/manifests/v6_team_configuration_weekly_v660_status.json \
            --allow-prefix football-data/manifests/v6_team_context_effective_v6610_status.json \
            --allow-prefix football-data/manifests/v6_roster_gap_inventory_v6611_status.json \
            --message-prefix "audit(football): persist authoritative derived team context"
      - name: Enforce authoritative four-state semantics
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          paths=[
            Path('football-data/manifests/v6_team_provisional_roster_v667_status.json'),
            Path('football-data/manifests/v6_current_roster_overlay_v669_status.json'),
            Path('football-data/manifests/v6_team_configuration_weekly_v660_status.json'),
            Path('football-data/manifests/v6_team_context_effective_v6610_status.json'),
            Path('football-data/manifests/v6_roster_gap_inventory_v6611_status.json')]
          if not all(p.exists() for p in paths): raise SystemExit('authoritative team-context receipts missing')
          p,c,t,e,g=[json.loads(x.read_text()) for x in paths]
          allowed_overlay={'PASS','WARN_INVALID_CURRENT_EVIDENCE'}
          if p.get('status')!='PASS' or c.get('status') not in allowed_overlay or not str(t.get('status')).startswith(('PASS','WARN')) or e.get('status')!='PASS' or g.get('status')!='PASS':
              raise SystemExit(str({'provisional':p.get('status'),'current_roster':c.get('status'),'team':t.get('status'),'effective':e.get('status'),'gap':g.get('status')}))
          if not str(c.get('schema_version') or '').startswith('V6.6.15-'):
              raise SystemExit(str({'stale_current_roster_schema':c.get('schema_version')}))
          states=e.get('roster_context_states') or {}; priorities=g.get('priority_counts') or {}
          expected_gap=sum(int(states.get(k) or 0) for k in ('NO_ROSTER_CONTEXT','PROVISIONAL_ONLY','ACTIVE_MATCH_POOL'))
          if int(g.get('unresolved_strict_current_gap_count') or -1)!=expected_gap:
              raise SystemExit('strict-current gap total mismatch')
          checks={'A_NO_CURRENT_CONTEXT':'NO_ROSTER_CONTEXT','B_HAS_PROVISIONAL_ONLY':'PROVISIONAL_ONLY','C_HAS_ACTIVE_MATCH_POOL':'ACTIVE_MATCH_POOL'}
          for priority,state in checks.items():
              if int(priorities.get(priority) or 0)!=int(states.get(state) or 0): raise SystemExit(f'state mismatch: {priority} vs {state}')
          if sum(int(states.get(k) or 0) for k in ('STRICT_CURRENT','ACTIVE_MATCH_POOL','PROVISIONAL_ONLY','NO_ROSTER_CONTEXT'))!=int(e.get('team_count') or 0):
              raise SystemExit('four-state conservation failed')
          gov=c.get('governance') or {}
          if gov.get('superseded_invalid_evidence_does_not_poison_current_status') is not True:
              raise SystemExit('V6.6.15 superseded-invalid governance missing')
          print(json.dumps({'overlay_schema':c.get('schema_version'),'overlay_status':c.get('status'),'strict_current':states.get('STRICT_CURRENT'),'active_match_pool':states.get('ACTIVE_MATCH_POOL'),'provisional_only':states.get('PROVISIONAL_ONLY'),'no_roster_context':states.get('NO_ROSTER_CONTEXT'),'strict_gap':g.get('unresolved_strict_current_gap_count'),'manager':(t.get('feature_eligibility') or {}).get('manager'),'full_context':(t.get('feature_eligibility') or {}).get('full_context'),'operational_invalid':c.get('operational_invalid_record_count'),'superseded_invalid':c.get('superseded_invalid_record_count')},ensure_ascii=False))
          PY
# This is the single authoritative writer for all derived team-context receipts.
# Source acquisition workflows persist evidence only; they never write these derived ledgers.
# If relevant inputs advance while this job runs, persistence is skipped and the newer push triggers a fresh run.