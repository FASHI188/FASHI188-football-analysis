name: Football V6.11.4 Two-Beta Draw Bias

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/validate_1x2_two_beta_draw_v6114.py"
      - ".github/workflows/football-v6114-two-beta-draw.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v6114-two-beta-draw
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: python -m py_compile football-data/validation/validate_1x2_two_beta_draw_v6114.py
      - name: Run two-beta draw-bias validation
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        shell: bash
        run: |
          set +e
          python football-data/validation/validate_1x2_two_beta_draw_v6114.py
          code=$?
          echo "validation_exit_code=$code" >> "$GITHUB_ENV"
          exit 0
      - name: Persist receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          path=football-data/manifests/v6_1x2_two_beta_draw_v6114_status.json
          if [ -f "$path" ]; then git add "$path"; fi
          if ! git diff --cached --quiet; then
            git commit -m "audit(football): persist two-beta draw-bias validation"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Enforce pass
        run: test "${validation_exit_code:-2}" = "0"
