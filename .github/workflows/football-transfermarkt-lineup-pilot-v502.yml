name: football-transfermarkt-lineup-pilot-v502

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/config/transfermarkt_lineup_map_v502.json"
      - "football-data/config/player_xi_source_contract_v502.json"
      - "football-data/engine/ingest_transfermarkt_lineups_v502.py"
      - "football-data/validation/probable_lineup_route_v502.py"
      - "football-data/validation/player_xi_data_readiness_v502.py"
      - "football-data/validation/run_player_xi_pilot_v502.py"
      - "football-data/tests/test_player_xi_v502.py"
      - ".github/workflows/football-transfermarkt-lineup-pilot-v502.yml"

permissions:
  contents: write

concurrency:
  group: football-transfermarkt-lineup-pilot-v502
  cancel-in-progress: false

jobs:
  ingest-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Execute audited pilot
        run: python football-data/validation/run_player_xi_pilot_v502.py

      - name: Commit success or failure evidence
        run: |
          find football-data -type d -name __pycache__ -prune -exec rm -rf {} +
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- football-data
          if git diff --cached --quiet; then
            echo "No generated evidence changed."
            exit 0
          fi
          git commit -m "audit(football): persist V5.0.2 public lineup pilot execution"
          git pull --rebase origin main
          git push

      - name: Enforce pilot result
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("football-data/manifests/player_xi_pilot_execution_v502_status.json")
          report = json.loads(path.read_text(encoding="utf-8"))
          if report.get("status") != "PASS":
              failed = [
                  stage.get("name")
                  for stage in report.get("stages", [])
                  if stage.get("status") == "FAIL"
              ]
              raise SystemExit(f"player-XI pilot failed stages: {failed}")
          print("player-XI pilot PASS")
          PY
