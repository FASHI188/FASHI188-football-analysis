name: Football V4.6.9 Cross-Year Batch2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/football-cross-year-batch2-v469.yml"
      - "football-data/validation/cross_year_batch2_v469.py"
      - "football-data/validation/persist_files_v474.py"
      - "football-data/config/platform_registry.json"
      - "football-data/league_profiles/ENG_PremierLeague/profile.json"
      - "football-data/league_profiles/GER_Bundesliga/profile.json"
      - "football-data/league_profiles/ITA_SerieA/profile.json"
      - "football-data/league_profiles/FRA_Ligue1/profile.json"
      - "football-data/league_profiles/ESP_LaLiga/profile.json"
      - "football-data/league_profiles/POR_PrimeiraLiga/profile.json"
      - "football-data/league_profiles/NED_Eredivisie/profile.json"
      - "football-data/league_profiles/SUI_SuperLeague/profile.json"
      - "football-data/league_profiles/SCO_Premiership/profile.json"
      - "football-data/league_profiles/UEFA_ChampionsLeague/profile.json"

permissions:
  contents: read

concurrency:
  group: football-cross-year-batch2-v469-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-batch2:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Repository integrity preflight
        run: python football-data/validation/repository_integrity_runtime_v473.py --strict-exit --print-summary

      - name: Compile batch2 audit and persistence helper
        run: |
          python -m py_compile football-data/validation/cross_year_batch2_v469.py
          python -m py_compile football-data/validation/persist_files_v474.py

      - name: Run cross-year batch2 audit
        run: python football-data/validation/cross_year_batch2_v469.py --print-summary

      - name: Persist batch2 audit receipt safely
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_files_v474.py \
            football-data/manifests/cross_year_batch2_v469_status.json \
            --message-prefix "audit(football): persist cross-year batch2 receipt"

# V4.7.4 hardening: audit must pass before receipt persistence; no direct git
# commit/pull/rebase/push occurs inside this workflow.
