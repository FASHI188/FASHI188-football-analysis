name: Football V5.0.1 Dynamic State Four-Target Verdict

on:
  push:
    branches:
      - main
    paths:
      - "football-data/manifests/bayesian_dynamic_state_adjudication_v501_status.json"
      - "football-data/manifests/bayesian_dynamic_state_second_stage_v501_status.json"
      - "football-data/manifests/retrospective_ah_dynamic_state_v501_status.json"
      - "football-data/validation/adjudicate_dynamic_state_four_target_v501.py"
      - ".github/workflows/football-v501-dynamic-state-four-target-verdict.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v501-dynamic-state-four-target-verdict
  cancel-in-progress: true

jobs:
  adjudicate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: python -m py_compile football-data/validation/adjudicate_dynamic_state_four_target_v501.py
      - name: Issue four-target verdict
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/adjudicate_dynamic_state_four_target_v501.py
      - name: Commit verdict receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/bayesian_dynamic_state_four_target_verdict_v501_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "governance(football): persist dynamic-state four-target verdict"
          git pull --rebase origin main
          git push origin HEAD:main
