name: Football V4.7 Dynamic Strength OOF Reconcile

on:
  push:
    branches:
      - main
    paths:
      - "football-data/manifests/dynamic_strength_oof_screen_v470_status.json"
      - "football-data/manifests/dynamic_strength_oof_readiness_v470_status.json"
      - "football-data/validation/reconcile_dynamic_strength_oof_status_v470.py"
      - ".github/workflows/football-v470-dynamic-strength-oof-reconcile.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v470-dynamic-strength-oof-reconcile
  cancel-in-progress: true

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile football-data/validation/reconcile_dynamic_strength_oof_status_v470.py
      - run: python football-data/validation/reconcile_dynamic_strength_oof_status_v470.py
      - name: Commit effective status
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/dynamic_strength_oof_effective_status_v470.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "audit(football): persist effective dynamic-strength OOF status"
          git pull --rebase origin main
          git push origin HEAD:main
