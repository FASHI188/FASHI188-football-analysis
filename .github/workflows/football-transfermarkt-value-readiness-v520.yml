name: football-transfermarkt-value-readiness-v520

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/validation/transfermarkt_value_readiness_v520.py"
      - ".github/workflows/football-transfermarkt-value-readiness-v520.yml"

permissions:
  contents: write

concurrency:
  group: football-transfermarkt-value-readiness-v520
  cancel-in-progress: true

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: python -m py_compile football-data/validation/transfermarkt_value_readiness_v520.py
      - name: Run valuation readiness audit
        run: python football-data/validation/transfermarkt_value_readiness_v520.py
      - name: Commit receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- football-data/manifests/transfermarkt_value_readiness_v520_status.json
          if git diff --cached --quiet; then
            echo "No Transfermarkt valuation readiness receipt changed."
            exit 0
          fi
          git commit -m "research(football): persist Transfermarkt valuation readiness"
          git pull --rebase origin main
          git push
