name: Football V6.16.5 Prep Market Columns
on:
  push:
    branches: [main]
    paths:
      - "football-data/validation/audit_market_columns_v6165prep.py"
      - ".github/workflows/football-v6165prep-market-columns.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python football-data/validation/audit_market_columns_v6165prep.py
      - shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          p=football-data/manifests/v6_market_column_availability_v6165prep.json
          git add "$p"
          if ! git diff --cached --quiet; then
            git commit -m "audit(football): persist V6.16.5 market-column scan"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
