name: football-v6-multiline-research-forward-v6853
on:
  workflow_dispatch:
  schedule:
    - cron: "53 */3 * * *"
  push:
    paths:
      - "football-data/evidence/market_ladders_v680/kambi_full_time_ladders.json"
      - "football-data/validation/v6_multiline_research_forward_v6853.py"
      - "football-data/validation/v6_multiline_market_matrix_projection_v682.py"
      - "football-data/validation/v6_pristine_forward_result_resolver_v612.py"
      - ".github/workflows/football-v6-multiline-research-forward-v6853.yml"
permissions:
  contents: read
concurrency:
  group: football-v6-multiline-research-forward-v6853
  cancel-in-progress: false
jobs:
  research-forward:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile pristine multiline research chain
        run: |
          python -m py_compile football-data/validation/v6_multiline_research_forward_v6853.py
          python -m py_compile football-data/validation/v6_multiline_market_matrix_projection_v682.py
          python -m py_compile football-data/validation/v6_pristine_forward_result_resolver_v612.py
      - name: Freeze settle and evaluate prospective research only
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: python football-data/validation/v6_multiline_research_forward_v6853.py
      - name: Persist immutable research freezes results and receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python football-data/validation/persist_generated_worktree_v474.py \
            --allow-prefix football-data/forward/v6_multiline_research_freezes_v6853/ \
            --allow-prefix football-data/evidence/multiline_research_results_v6853/ \
            --allow-prefix football-data/manifests/v6_multiline_research_forward_epoch_v6853.json \
            --allow-prefix football-data/manifests/v6_multiline_research_forward_v6853_status.json \
            --message-prefix "audit(football): persist V6.8.5.3 pristine multiline Fast100 forward evidence"
      - name: Enforce research-only receipt
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          e=Path('football-data/manifests/v6_multiline_research_forward_epoch_v6853.json')
          s=Path('football-data/manifests/v6_multiline_research_forward_v6853_status.json')
          if not e.exists() or not s.exists(): raise SystemExit('V6.8.5.3 receipts missing')
          epoch=json.loads(e.read_text()); status=json.loads(s.read_text())
          if epoch.get('status')!='FROZEN': raise SystemExit(str(epoch))
          if status.get('status')!='PASS': raise SystemExit(str(status))
          g=status.get('governance') or {}
          if g.get('new_epoch_no_historical_backfill') is not True: raise SystemExit('historical-backfill guard missing')
          if g.get('formal_probability_change') is not False or g.get('current_rule_change') is not False: raise SystemExit('formal mutation guard failed')
          print(json.dumps({
            'epoch':status.get('research_epoch_timestamp_utc'),
            'freeze_count':status.get('freeze_count'),
            'settled_count':status.get('settled_count'),
            'open_count':status.get('open_count'),
            'fast100':status.get('fast100')
          },ensure_ascii=False))
          PY
# Research-only challenger. No V5.0.1 CURRENT, formal weight, or runtime probability mutation.
