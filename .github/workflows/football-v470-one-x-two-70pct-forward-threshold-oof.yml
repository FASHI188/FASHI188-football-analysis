name: Football V4.7 1X2 70pct Forward Threshold OOF

on:
  push:
    branches:
      - main
    paths:
      - "football-data/validation/one_x_two_70pct_forward_threshold_oof_v470.py"
      - "football-data/validation/backtest_last_complete_season_all_domains_v470.py"
      - ".github/workflows/football-v470-one-x-two-70pct-forward-threshold-oof.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v470-one-x-two-70pct-forward-threshold-oof
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: |
          python -m py_compile football-data/validation/backtest_last_complete_season_all_domains_v470.py
          python -m py_compile football-data/validation/one_x_two_70pct_forward_threshold_oof_v470.py
      - name: Run forward OOF
        id: validate
        shell: bash
        env:
          PYTHONPATH: football-data/engine:football-data/validation
        run: |
          set +e
          python football-data/validation/one_x_two_70pct_forward_threshold_oof_v470.py
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add football-data/manifests/one_x_two_70pct_forward_threshold_oof_v470_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "research(football): persist forward-frozen 70pct 1X2 OOF"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Preserve validation failure after receipt persistence
        if: steps.validate.outputs.rc != '0'
        run: exit 1
