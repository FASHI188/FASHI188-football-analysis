name: Football V4.7 Free Sweden Market Research

on:
  push:
    branches:
      - main
    paths:
      - "football-data/ingestion/football_data_free_sweden_market_v470.py"
      - ".github/workflows/football-v470-free-sweden-market-research.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-v470-free-sweden-market-research
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile football-data/ingestion/football_data_free_sweden_market_v470.py
      - name: Download and normalize research-only market data
        id: ingest
        shell: bash
        run: |
          set +e
          python football-data/ingestion/football_data_free_sweden_market_v470.py
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit evidence and coverage receipt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f football-data/evidence/markets/SWE_Allsvenskan/football_data_free_preclosing_2026.jsonl ]; then
            git add football-data/evidence/markets/SWE_Allsvenskan/football_data_free_preclosing_2026.jsonl
          fi
          git add football-data/manifests/market_lomo_research/SWE_Allsvenskan_football_data_free_coverage.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "data(football): persist free Sweden market research coverage"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Preserve ingestion failure state after receipt persistence
        if: steps.ingest.outputs.rc != '0'
        run: exit 1
