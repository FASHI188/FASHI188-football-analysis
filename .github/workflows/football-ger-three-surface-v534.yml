name: football-ger-three-surface-v534

on:
  workflow_dispatch:
  push:
    paths:
      - "football-data/config/ger_three_surface_market_projection_v533.json"
      - "football-data/validation/ger_three_surface_market_projection_v534.py"
      - ".github/workflows/football-ger-three-surface-v534.yml"

permissions:
  contents: write

concurrency:
  group: football-ger-three-surface-v534
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run frozen GER three-surface market architecture
        run: |
          python -m py_compile football-data/validation/ger_three_surface_market_projection_v534.py
          python football-data/validation/ger_three_surface_market_projection_v534.py
      - name: Commit three-surface receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- football-data/manifests/ger_three_surface_market_projection_v534_status.json
          if git diff --cached --quiet; then
            echo "No GER three-surface result changed."
            exit 0
          fi
          git commit -m "research(football): persist GER three-surface market projection"
          git pull --rebase origin main
          git push
